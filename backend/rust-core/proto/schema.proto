syntax = "proto3";

package syrabit;

// Chat request message for AI interactions
message ChatRequest {
  string user_id = 1;
  string session_id = 2;
  string message = 3;
  optional string context = 4;
  repeated MessageHistory history = 5;
  map<string, string> metadata = 6;
}

message MessageHistory {
  string role = 1; // user, assistant, system
  string content = 2;
  int64 timestamp = 3;
}

message ChatResponse {
  string response_id = 1;
  string content = 2;
  bool is_streaming = 3;
  optional string source_document = 4;
  float confidence_score = 5;
  repeated Citation citations = 6;
  Metrics metrics = 7;
}

message Citation {
  string document_id = 1;
  string text = 2;
  float relevance_score = 3;
  optional string url = 4;
}

// RAG Query messages
message RagQuery {
  string query = 1;
  int32 top_k = 2;
  optional float score_threshold = 3;
  repeated string filters = 4; // board_id, class_id, subject_id, etc.
  bool hybrid_search = 5;
  int32 hop_count = 6; // For GraphRAG traversal
}

message RagResult {
  string document_id = 1;
  string content = 2;
  float score = 3;
  map<string, string> metadata = 4;
  repeated string related_ids = 5; // For graph traversal
}

message RagResponse {
  repeated RagResult results = 1;
  int64 latency_ms = 2;
  string search_type = 3; // vector, keyword, hybrid
  int32 total_traversed = 4; // GraphRAG hops
}

// Agent command messages
message AgentCommand {
  string agent_id = 1;
  string action = 2; // execute, pause, resume, terminate
  map<string, string> parameters = 3;
  optional string target_resource = 4;
}

message AgentStatus {
  string agent_id = 1;
  string state = 2; // idle, running, paused, error
  string current_task = 3;
  int64 started_at = 4;
  map<string, string> progress = 5;
}

message AgentResponse {
  string command_id = 1;
  bool success = 2;
  optional string error_message = 3;
  AgentStatus status = 4;
}

// Health & Metrics
message HealthCheck {
  string service = 1;
  string version = 2;
  int64 uptime_seconds = 3;
  SystemMetrics metrics = 4;
}

message SystemMetrics {
  float cpu_usage = 1;
  float memory_usage = 2;
  int32 active_connections = 3;
  int32 requests_per_second = 4;
  float avg_latency_ms = 5;
}

message Metrics {
  int64 total_time_ms = 1;
  int64 rag_time_ms = 2;
  int64 llm_time_ms = 3;
  int64 graph_traversal_time_ms = 4;
}

// Edge routing hints
message EdgeRoutingHint {
  string route_pattern = 1;
  bool cacheable = 2;
  int32 ttl_seconds = 3;
  optional string fallback_target = 4;
}

// Service definitions
service NeuralMeshService {
  // Chat with AI assistant
  rpc Chat(ChatRequest) returns (stream ChatResponse);
  
  // RAG queries with GraphRAG support
  rpc QueryRag(RagQuery) returns (RagResponse);
  
  // Execute agent commands
  rpc ExecuteAgent(AgentCommand) returns (AgentResponse);
  
  // Health check
  rpc HealthCheck(HealthCheck) returns (HealthCheck);
  
  // Stream metrics for JARVIS HUD
  rpc StreamMetrics(MetricsRequest) returns (stream MetricsUpdate);
}

message MetricsRequest {
  string client_id = 1;
  int32 interval_ms = 2;
}

message MetricsUpdate {
  int64 timestamp = 1;
  SystemMetrics system = 2;
  ActiveAgents agents = 3;
  NodeHealth health = 4;
}

message ActiveAgents {
  int32 total = 1;
  int32 idle = 2;
  int32 running = 3;
  int32 paused = 4;
  int32 error = 5;
}

message NodeHealth {
  bool healthy = 1;
  float load_factor = 2;
  repeated string warnings = 3;
}
