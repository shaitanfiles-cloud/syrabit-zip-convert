# Syrabit Neural Mesh Core - Railway Deployment

[build]
builder = "dockerfile"
dockerfilePath = "backend/rust-core/Dockerfile"

[deploy]
startCommand = "./rust-core"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[env]
RUST_LOG = "info"
HTTP_PORT = "3000"
GRPC_PORT = "50051"
ENVIRONMENT = "production"

# These should be set as Railway secrets:
# DATABASE_URL - PostgreSQL connection string
# JWT_SECRET - Secret key for JWT token generation

[[services]]
name = "rust-core-http"
port = 3000
protocol = "http"

[[services]]
name = "rust-core-grpc"
port = 50051
protocol = "tcp"
