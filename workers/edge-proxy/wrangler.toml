name = "syrabit-edge"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "api.syrabit.ai/*", zone_name = "syrabit.ai" }
]

[vars]
BACKEND_URL = "https://syrabit-api.up.railway.app"

# Create KV namespaces before deploying:
#   wrangler kv:namespace create RATE_LIMIT
#   wrangler kv:namespace create RATE_LIMIT --preview
# Then paste the returned IDs below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"
