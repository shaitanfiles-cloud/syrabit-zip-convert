name = "syrabit-edge"
main = "src/index.ts"
account_id = "d66e40eac539fff1db270fddf384a5ec"
compatibility_date = "2025-05-01"
compatibility_flags = [
  "nodejs_compat_v2",
]

# ---------------------------------------------------------------------------
# Enterprise zone / Workers Standard settings
# ---------------------------------------------------------------------------
# NOTE: usage_model="unbound" and [limits] cpu_ms require Workers Enterprise
# Unbound subscription (separate from the syrabit.ai Enterprise Website zone
# plan). When that subscription is activated on the account, uncomment:
#   usage_model = "unbound"
#   [limits]
#   cpu_ms = 30000
# Until then the Standard Workers model applies (10ms CPU / 128MB RAM).

# Smart Placement — Cloudflare automatically routes each isolate invocation
# to the data-centre closest to the Railway backend origin, not to the user.
# This cuts origin RTT on API proxying by 30–60 ms in Asia Pacific markets
# (the primary Assam user base). Available on Workers Standard Paid.
[placement]
mode = "smart"

# Workers Logpush — streams structured request/response metadata to the
# Logpush pipeline configured in the dashboard (Cloudflare → Analytics →
# Logpush → Workers Trace Events). Available on Workers Standard Paid.
logpush = true

# Workers Observability — enables per-request sampling in the CF dashboard
# (Workers → Observability). head_sampling_rate = 0.1 → sample 10 % of
# requests so the flame-graph / tail-latency views are populated without
# burning the full per-request cost on high-traffic paths.
[observability]
enabled = true
head_sampling_rate = 0.1

routes = [
  { pattern = "api.syrabit.ai/*", zone_name = "syrabit.ai" },
  { pattern = "syrabit.ai/*", zone_name = "syrabit.ai" },
  { pattern = "www.syrabit.ai/*", zone_name = "syrabit.ai" },
]

[vars]
# ---------------------------------------------------------------------------
# BACKEND_URL — the production Railway backend the edge worker proxies to.
#
# Despite the misleading hostname, `workspacemockup-sandbox-production-df37`
# IS the live production Railway service. It was originally created off a
# sandbox project's name and never renamed — the URL is permanent because
# Railway hostnames cannot be changed without re-provisioning. A `curl
# /api/health` against it returns the real Syrabit.ai API (status 200,
# `"service":"Syrabit.ai API"`).
#
# Verified state (Apr 2026):
#   - Live worker has BACKEND_URL set ONLY as a plaintext binding (this
#     value); there is no encrypted secret override on the dashboard.
#   - `wrangler deploy` from this repo therefore round-trips the same
#     value back into production — safe to redeploy at any time.
#
# How to change the backend URL:
#   1. Update this line and `wrangler deploy`. The new value is what
#      production will use; there is nothing to also edit in the dashboard.
#   2. If you want the new value to be a *secret* instead of plaintext,
#      first delete this `BACKEND_URL = "..."` line, then run
#      `wrangler secret put BACKEND_URL` and enter the value. Wrangler
#      secrets ARE preserved across deploys, but only when the same name
#      is not also declared as a plaintext var here (a plaintext var with
#      the same name overwrites the secret on every deploy).
#   3. For local `wrangler dev`, create workers/edge-proxy/.dev.vars
#      (gitignored):
#        BACKEND_URL=https://your-local-or-staging-host.up.railway.app
#
# Followup if the misleading name keeps confusing operators: rename the
# Railway service to e.g. `syrabit-prod-api` (requires re-provisioning +
# DNS-style cutover) and update the value below in the same commit.
# ---------------------------------------------------------------------------
BACKEND_URL = "https://workspacemockup-sandbox-production-df37.up.railway.app"

# D1_WARM_ON_STARTUP — Enable cache warming on worker startup to eliminate
# cold-start latency (~10-50ms → ~0ms). When true, runs D1 sync immediately
# when the worker boots before any user traffic arrives.
D1_WARM_ON_STARTUP = "true"
# Pages origin used by the worker to serve non-API GETs (the SPA).
# MUST be the *.pages.dev hostname, not syrabit.ai/www.syrabit.ai —
# routing through the custom domain would re-enter this same worker
# (it is bound to syrabit.ai/* and www.syrabit.ai/*) and recurse.
PAGES_ORIGIN = "https://syrabit-zip-convert.pages.dev"
# D1_SYNC_SECRET must be set via Wrangler secret (not committed to source control):
#   wrangler secret put D1_SYNC_SECRET
#
# Task #606 — BACKEND_ORIGIN_SECRET: shared secret the worker injects on
# every backend fetch as `X-Origin-Auth`. Required when BACKEND_URL points
# at the Cloud Run service (the Cloud Run app rejects requests without it
# via OriginSharedSecretMiddleware). Set via:
#   wrangler secret put BACKEND_ORIGIN_SECRET
# The same value MUST be set as ORIGIN_SHARED_SECRET on the Cloud Run
# service (Secret Manager binding — see CLOUDRUN-DEPLOY.md).

# Task #636 — Workers AI binding for the auto-fallback fan-out at
# /api/ai/fallback/{chat,embed,tts,stt}. The backend hits these routes
# only when the primary provider (Vertex/Gemini for chat & embed,
# Sarvam for TTS/STT) times out, returns 5xx/429, or hits a quota.
# Models used:
#   chat  → @cf/meta/llama-3.1-8b-instruct
#   embed → @cf/baai/bge-base-en-v1.5
#   stt   → @cf/openai/whisper
#   tts   → @cf/myshell-ai/melotts
# Workers AI billing is per-account; no extra secret needed because the
# binding is implicit.
[ai]
binding = "AI"

# Shared secret the FastAPI backend sends as `X-Edge-AI-Secret` on every
# /api/ai/fallback/* call. Without it the routes reject with 401 — this
# stops randoms from burning Workers AI quota by hitting api.syrabit.ai
# directly. Set via `wrangler secret put EDGE_AI_FALLBACK_SECRET` and the
# *same* value as WORKERS_AI_FALLBACK_SECRET on the Cloud Run / Railway
# backend (see providers/workers_ai.py).

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "3ee723af8e82480eb6d4855b0ca09f69"
preview_id = "c7d531ef4b9a4cd980134251f5739556"

# Create KV namespace before deploying:
#   wrangler kv namespace create BOT_HTML_CACHE
#   wrangler kv namespace create BOT_HTML_CACHE --preview
# Then replace the IDs below with the output values.
[[kv_namespaces]]
binding = "BOT_HTML_CACHE"
id = "a92591899d544ddb8ac61c54d2b40180"
preview_id = "2c67fcc51dbf430391602e11d7a5e9fe"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "981e939bcca445c481d4be818ebefee7"
# ⚠ MISCONFIGURATION: preview_id is identical to production id. This means
# `wrangler dev --remote` reads/writes the live production KV namespace,
# which can silently corrupt cached content. Fix:
#   wrangler kv namespace create CONTENT_CACHE --preview
# Then replace this preview_id with the output ID.
preview_id = "981e939bcca445c481d4be818ebefee7"

[[d1_databases]]
binding = "CONTENT_DB"
database_name = "syrabit-content"
database_id = "da5b5b9d-a8f9-43dd-bd23-a938f5c0cf69"
migrations_dir = "migrations"

# Task #108 — Phase 4: R2 student asset storage.
# Serves AHSEC/SEBA past-year question papers, syllabi, and study PDFs.
# Admins upload via POST /admin/assets/upload (protected by Zero Trust from Phase 3).
# Files are served at https://assets.syrabit.ai/<key> via the R2 custom domain.
#
# To create the bucket and custom domain before deploying:
#   node artifacts/syrabit/scripts/cloudflare-phase4-apply.js
[[r2_buckets]]
binding     = "ASSETS"
bucket_name = "syrabit-assets"
# preview_bucket_name omitted — `wrangler dev` will error with a clear message
# if you try to use ASSETS locally without it. Add a test bucket when needed:
#   wrangler r2 bucket create syrabit-assets-dev

# Vectorize binding — currently OFF by design.
#
# Embedding generation, upserts, and queries all happen in the Railway
# backend (see artifacts/syrabit-backend/vectorize_client.py). The backend
# talks to Vectorize over the Cloudflare REST API using CLOUDFLARE_API_TOKEN
# and writes to the index named in the VECTORIZE_INDEX_NAME env var
# (defaults to `syllabus-index-v2`, 1024 dim, cosine — Gemini
# gemini-embedding-001 at 1024d; the legacy `syllabus-index` 768d
# index is kept untouched for rollback).
#
# Re-enable this binding only if/when the edge worker itself needs to do
# semantic search at the edge (lower latency, no backend round-trip).
# In that case, first create the index from your local machine:
#
#   pnpm dlx wrangler vectorize create syllabus-index-v2 \
#       --dimensions=1024 --metric=cosine
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=subject_id --type=string
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=chapter_id --type=string
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=level      --type=string
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=board      --type=string
#
# Then uncomment:
# [[vectorize]]
# binding   = "SYLLABUS_INDEX"
# index_name = "syllabus-index-v2"

# ---------------------------------------------------------------------------
# Vectorize bindings — ENABLED for enterprise edge semantic search.
#
# Enterprise Vectorize limits (2025):
#   - Up to 5 000 000 vectors per index
#   - Up to 1 536 dimensions per vector
#   - Metadata filtering across 10 metadata indexes per index
#   - Low-latency direct binding (no HTTP round-trip, no CLOUDFLARE_API_TOKEN)
#
# SYLLABUS_INDEX   → syllabus-index-v2, 1024-dim cosine (Gemini embeddings)
#                    Primary index used for semantic chapter/topic search.
# SYLLABUS_INDEX_LEGACY → syllabus-index, 768-dim cosine (BGE embeddings)
#                    Kept for rollback if the 1024-dim index is ever
#                    re-embedded; queries fall back here when v2 returns
#                    no results above the similarity threshold.
# ---------------------------------------------------------------------------
[[vectorize]]
binding    = "SYLLABUS_INDEX"
index_name = "syllabus-index-v2"

[[vectorize]]
binding    = "SYLLABUS_INDEX_LEGACY"
index_name = "syllabus-index"

# ---------------------------------------------------------------------------
# Phase 5 (Task #109) — Workers Analytics Engine: custom edge metrics dataset.
#
# ANALYTICS is writable from the edge worker via env.ANALYTICS.writeDataPoint().
# The dataset is created automatically on first write; no API call needed.
# Query the dataset via the Analytics Engine SQL API or the /api/edge/analytics
# worker route (requires CF_ANALYTICS_TOKEN secret with Analytics Read scope).
#
# Set the CF Analytics token as a Worker secret before deploying:
#   wrangler secret put CF_ANALYTICS_TOKEN
# ---------------------------------------------------------------------------
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "syrabit-edge-metrics"

# ---------------------------------------------------------------------------
# Phase 5 (Task #109) — Durable Object rate limiter.
#
# RateLimiter provides strongly-consistent, per-key sliding-window rate limits.
# The edge worker uses it instead of the KV-based checkRateLimit() for all
# API and AI rate-limit checks. KV remains as a fallback when the DO namespace
# is not yet bound (e.g. local dev without wrangler.toml migration applied).
#
# Deploy steps:
#   1. wrangler deploy   ← runs the [[migrations]] below, creating the namespace
#   2. The DO namespace ID is auto-assigned and pinned on the CF dashboard.
#      It is NOT stored in wrangler.toml — wrangler resolves it by class name.
# ---------------------------------------------------------------------------
[[durable_objects.bindings]]
name       = "RATE_LIMITER_DO"
class_name = "RateLimiter"

[[migrations]]
tag         = "v1"
new_classes = ["RateLimiter"]

[triggers]
# Two crons fan out from the same `scheduled` handler in src/index.ts —
# the dispatch arm reads `event.cron` and runs the right job:
#
#   "* * * * *"   → Task #708 synthetic probe of /api/admin/diagnostics.
#                   Hits the endpoint every 60s with a CF Access service
#                   token + admin JWT so the break-glass / Access-degraded
#                   paging rule (Task #706) actually fires during an
#                   outage where no admin happens to be browsing.
#                   Required secrets/vars (set via `wrangler secret put`
#                   or the dashboard — see docs/CLOUDFLARE_ZERO_TRUST.md
#                   §7.1 for the rotation procedure):
#                     SYNTHETIC_PROBE_CF_ACCESS_CLIENT_ID
#                     SYNTHETIC_PROBE_CF_ACCESS_CLIENT_SECRET
#                     SYNTHETIC_PROBE_ADMIN_JWT
#                     SYNTHETIC_PROBE_WATCHDOG_WEBHOOK_URL  ← REQUIRED for
#                       paging; without it the watchdog only logs to the
#                       Workers console and no human gets woken up. The
#                       absence of this secret was the root cause of the
#                       Task #877 silent-outage incident — set it before
#                       relying on this probe. Slack incoming-webhook URL
#                       or PagerDuty Events v2 endpoint both accepted.
#                   Optional: SYNTHETIC_PROBE_TARGET_URL (defaults to
#                   ${BACKEND_URL}/api/admin/diagnostics — note the
#                   `/api` prefix; the FastAPI router is mounted at
#                   `/api`, hitting bare `/admin/diagnostics` returns
#                   404 — Task #877),
#                   SYNTHETIC_PROBE_WATCHDOG_THRESHOLD_MIN (default 5),
#                   SYNTHETIC_PROBE_DISABLED=true to pause without
#                   redeploying.
#
#                   ALSO runs Task #898 bot-cache hit-rate / fallback
#                   watchdog. NOTE the data source: although the task
#                   description (and the admin dashboard) reference
#                   `/api/edge/kv-usage` → `bot_cache.hit_rate`, the
#                   watchdog deliberately reads the same underlying
#                   `bot_cache:count:*` counters DIRECTLY from
#                   RATE_LIMIT KV inside the same isolate. Skipping
#                   the HTTP round-trip removes an auth dependency and
#                   keeps the watchdog alive in the failure mode where
#                   the admin endpoint itself is degraded. The numbers
#                   the watchdog evaluates are therefore exactly the
#                   numbers `/api/edge/kv-usage` would report.
#                   Pages on:
#                     - hit-rate drop ≥30pp over the last 15m vs the
#                       prior 15m (cache-key regression),
#                     - fallback rate ≥10% over the last 15m
#                       (degraded prerender pipeline).
#                   Re-uses SYNTHETIC_PROBE_WATCHDOG_WEBHOOK_URL but
#                   tags payloads with alert_type=
#                   bot_cache_hit_rate_drop / bot_cache_fallback_elevated.
#                   Optional knobs: BOT_CACHE_ALERT_DROP_PCT (default 30),
#                   BOT_CACHE_ALERT_FALLBACK_PCT (default 10),
#                   BOT_CACHE_ALERT_MIN_SAMPLE (default 20),
#                   BOT_CACHE_ALERT_WINDOW_BUCKETS (default 3 → 15m),
#                   BOT_CACHE_ALERT_DISABLED=true to pause.
#
#   "0 */6 * * *" → 6-hourly D1 content sync from the Railway backend.
crons = ["* * * * *", "0 */6 * * *"]

# ---------------------------------------------------------------------------
# Phase 6 (Task #110) — mTLS client certificate for Railway origin hardening.
#
# The `MTLS_CERT` binding presents a Cloudflare-issued client certificate on
# every outbound TLS connection to the Railway backend.  Railway's mTLS policy
# (configured separately) rejects connections that do not present this cert,
# closing the bypass risk where a leaked BACKEND_ORIGIN_SECRET could be used
# to hit the backend directly.  BACKEND_ORIGIN_SECRET is kept as belt-and-
# suspenders; the cert is the primary enforcement mechanism.
#
# Provision steps (one-time — run once per certificate lifecycle, ~10 y):
#   1. Issue the mTLS cert via cloudflare-phase6-apply.js:
#        CLOUDFLARE_API_TOKEN=<tok> node artifacts/syrabit/scripts/cloudflare-phase6-apply.js
#      The script calls POST /accounts/{id}/mtls_certificates, prints the
#      certificate_id, and writes the private key to stdout.
#   2. Store the private key as a wrangler secret:
#        echo "<pem>" | wrangler secret put MTLS_PRIVATE_KEY --name syrabit-edge
#   3. Fill in the certificate_id below and run `wrangler deploy`.
#
# certificate_id: replace the placeholder with the ID from step 1 above.
#   Find it later at dash.cloudflare.com → SSL/TLS → Client Certificates.
# ---------------------------------------------------------------------------
# [[mtls_certificates]]                           ← UNCOMMENT after provisioning
# binding        = "MTLS_CERT"
# certificate_id = "<id-from-cloudflare-phase6-apply.js>"
#
# Full mTLS activation checklist (one-time — run once per cert lifecycle ~10 y):
#   1. Issue the cert:
#        CLOUDFLARE_API_TOKEN=<tok> GA4_MEASUREMENT_ID=G-XXXXXXX \
#          node artifacts/syrabit/scripts/cloudflare-phase6-apply.js
#   2. Store the private key:
#        echo "<pem>" | wrangler secret put MTLS_PRIVATE_KEY --name syrabit-edge
#   3. Uncomment the three [[mtls_certificates]] lines above.
#      Replace certificate_id with the UUID printed by step 1.
#   4. Deploy the updated binding:
#        cd workers/edge-proxy && wrangler deploy
#   5. Configure Railway to require the Cloudflare client certificate
#      (Railway → Service → Settings → mTLS).
#   6. Flip the fail-closed gate (after verifying Railway accepts the cert):
#        wrangler secret put MTLS_REQUIRED --name syrabit-edge
#        (enter: true)
#   ℹ  MTLS_REQUIRED=true causes proxyToBackend() to return 503 when MTLS_CERT
#      is absent — prevents insecure fallback to plain fetch in production.
