name = "syrabit-edge"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "api.syrabit.ai/*", zone_name = "syrabit.ai" }
]

[vars]
# After deploying the Replit backend, replace this with your Replit deployment URL
# (e.g. "https://<your-repl-slug>.<your-username>.replit.app")
BACKEND_URL = "https://REPLIT_DEPLOY_URL"
D1_SYNC_SECRET = "REPLACE_WITH_SECURE_RANDOM_SECRET"

# Create KV namespaces before deploying:
#   wrangler kv:namespace create RATE_LIMIT
#   wrangler kv:namespace create RATE_LIMIT --preview
# Then paste the returned IDs below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# Create D1 database before deploying:
#   wrangler d1 create syrabit-content
# Then paste the returned database_id below.
# Apply migrations:
#   wrangler d1 migrations apply syrabit-content --local
#   wrangler d1 migrations apply syrabit-content --remote
[[d1_databases]]
binding = "CONTENT_DB"
database_name = "syrabit-content"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[triggers]
crons = ["0 */6 * * *"]
