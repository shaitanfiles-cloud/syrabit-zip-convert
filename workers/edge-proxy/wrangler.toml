name = "syrabit-edge"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "api.syrabit.ai/*", zone_name = "syrabit.ai" },
  { pattern = "syrabit.ai/*", zone_name = "syrabit.ai" },
  { pattern = "www.syrabit.ai/*", zone_name = "syrabit.ai" },
]

[vars]
# ---------------------------------------------------------------------------
# BACKEND_URL — the production Railway backend the edge worker proxies to.
#
# Despite the misleading hostname, `workspacemockup-sandbox-production-df37`
# IS the live production Railway service. It was originally created off a
# sandbox project's name and never renamed — the URL is permanent because
# Railway hostnames cannot be changed without re-provisioning. A `curl
# /api/health` against it returns the real Syrabit.ai API (status 200,
# `"service":"Syrabit.ai API"`).
#
# Verified state (Apr 2026):
#   - Live worker has BACKEND_URL set ONLY as a plaintext binding (this
#     value); there is no encrypted secret override on the dashboard.
#   - `wrangler deploy` from this repo therefore round-trips the same
#     value back into production — safe to redeploy at any time.
#
# How to change the backend URL:
#   1. Update this line and `wrangler deploy`. The new value is what
#      production will use; there is nothing to also edit in the dashboard.
#   2. If you want the new value to be a *secret* instead of plaintext,
#      first delete this `BACKEND_URL = "..."` line, then run
#      `wrangler secret put BACKEND_URL` and enter the value. Wrangler
#      secrets ARE preserved across deploys, but only when the same name
#      is not also declared as a plaintext var here (a plaintext var with
#      the same name overwrites the secret on every deploy).
#   3. For local `wrangler dev`, create workers/edge-proxy/.dev.vars
#      (gitignored):
#        BACKEND_URL=https://your-local-or-staging-host.up.railway.app
#
# Followup if the misleading name keeps confusing operators: rename the
# Railway service to e.g. `syrabit-prod-api` (requires re-provisioning +
# DNS-style cutover) and update the value below in the same commit.
# ---------------------------------------------------------------------------
BACKEND_URL = "https://workspacemockup-sandbox-production-df37.up.railway.app"
# Pages origin used by the worker to serve non-API GETs (the SPA).
# MUST be the *.pages.dev hostname, not syrabit.ai/www.syrabit.ai —
# routing through the custom domain would re-enter this same worker
# (it is bound to syrabit.ai/* and www.syrabit.ai/*) and recurse.
PAGES_ORIGIN = "https://syrabit-zip-convert.pages.dev"
# D1_SYNC_SECRET must be set via Wrangler secret (not committed to source control):
#   wrangler secret put D1_SYNC_SECRET
#
# Task #606 — BACKEND_ORIGIN_SECRET: shared secret the worker injects on
# every backend fetch as `X-Origin-Auth`. Required when BACKEND_URL points
# at the Cloud Run service (the Cloud Run app rejects requests without it
# via OriginSharedSecretMiddleware). Set via:
#   wrangler secret put BACKEND_ORIGIN_SECRET
# The same value MUST be set as ORIGIN_SHARED_SECRET on the Cloud Run
# service (Secret Manager binding — see CLOUDRUN-DEPLOY.md).

# Task #636 — Workers AI binding for the auto-fallback fan-out at
# /api/ai/fallback/{chat,embed,tts,stt}. The backend hits these routes
# only when the primary provider (Vertex/Gemini for chat & embed,
# Sarvam for TTS/STT) times out, returns 5xx/429, or hits a quota.
# Models used:
#   chat  → @cf/meta/llama-3.1-8b-instruct
#   embed → @cf/baai/bge-base-en-v1.5
#   stt   → @cf/openai/whisper
#   tts   → @cf/myshell-ai/melotts
# Workers AI billing is per-account; no extra secret needed because the
# binding is implicit.
[ai]
binding = "AI"

# Shared secret the FastAPI backend sends as `X-Edge-AI-Secret` on every
# /api/ai/fallback/* call. Without it the routes reject with 401 — this
# stops randoms from burning Workers AI quota by hitting api.syrabit.ai
# directly. Set via `wrangler secret put EDGE_AI_FALLBACK_SECRET` and the
# *same* value as WORKERS_AI_FALLBACK_SECRET on the Cloud Run / Railway
# backend (see providers/workers_ai.py).

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "3ee723af8e82480eb6d4855b0ca09f69"
preview_id = "c7d531ef4b9a4cd980134251f5739556"

# Create KV namespace before deploying:
#   wrangler kv namespace create BOT_HTML_CACHE
#   wrangler kv namespace create BOT_HTML_CACHE --preview
# Then replace the IDs below with the output values.
[[kv_namespaces]]
binding = "BOT_HTML_CACHE"
id = "a92591899d544ddb8ac61c54d2b40180"
preview_id = "2c67fcc51dbf430391602e11d7a5e9fe"

[[d1_databases]]
binding = "CONTENT_DB"
database_name = "syrabit-content"
database_id = "da5b5b9d-a8f9-43dd-bd23-a938f5c0cf69"
migrations_dir = "migrations"

# Vectorize binding — currently OFF by design.
#
# Embedding generation, upserts, and queries all happen in the Railway
# backend (see artifacts/syrabit-backend/vectorize_client.py). The backend
# talks to Vectorize over the Cloudflare REST API using CLOUDFLARE_API_TOKEN
# and writes to the index named in the VECTORIZE_INDEX_NAME env var
# (defaults to `syllabus-index-v2`, 1024 dim, cosine — Gemini
# gemini-embedding-001 at 1024d; the legacy `syllabus-index` 768d
# index is kept untouched for rollback).
#
# Re-enable this binding only if/when the edge worker itself needs to do
# semantic search at the edge (lower latency, no backend round-trip).
# In that case, first create the index from your local machine:
#
#   pnpm dlx wrangler vectorize create syllabus-index-v2 \
#       --dimensions=1024 --metric=cosine
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=subject_id --type=string
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=chapter_id --type=string
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=level      --type=string
#   pnpm dlx wrangler vectorize create-metadata-index \
#       syllabus-index-v2 --property-name=board      --type=string
#
# Then uncomment:
# [[vectorize]]
# binding   = "SYLLABUS_INDEX"
# index_name = "syllabus-index-v2"

[triggers]
# Two crons fan out from the same `scheduled` handler in src/index.ts —
# the dispatch arm reads `event.cron` and runs the right job:
#
#   "* * * * *"   → Task #708 synthetic probe of /admin/diagnostics.
#                   Hits the endpoint every 60s with a CF Access service
#                   token + admin JWT so the break-glass / Access-degraded
#                   paging rule (Task #706) actually fires during an
#                   outage where no admin happens to be browsing.
#                   Required secrets/vars (set via `wrangler secret put`
#                   or the dashboard — see docs/CLOUDFLARE_ZERO_TRUST.md
#                   §7.1 for the rotation procedure):
#                     SYNTHETIC_PROBE_CF_ACCESS_CLIENT_ID
#                     SYNTHETIC_PROBE_CF_ACCESS_CLIENT_SECRET
#                     SYNTHETIC_PROBE_ADMIN_JWT
#                     SYNTHETIC_PROBE_WATCHDOG_WEBHOOK_URL
#                   Optional: SYNTHETIC_PROBE_TARGET_URL (defaults to
#                   ${BACKEND_URL}/admin/diagnostics),
#                   SYNTHETIC_PROBE_WATCHDOG_THRESHOLD_MIN (default 5),
#                   SYNTHETIC_PROBE_DISABLED=true to pause without
#                   redeploying.
#
#   "0 */6 * * *" → 6-hourly D1 content sync from the Railway backend.
crons = ["* * * * *", "0 */6 * * *"]
