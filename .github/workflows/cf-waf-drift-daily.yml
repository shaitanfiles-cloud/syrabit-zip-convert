name: cf-waf-drift-daily

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes (Task #905): every workflow declares an explicit
# top-level `permissions:` block granting only the `GITHUB_TOKEN` scopes its
# jobs actually need — read-only by default. Omitting `permissions:` falls
# back to the repo default (`contents: write`), which would defeat the
# SHA-pinning hardening if a pinned action were ever compromised.
#
# Task #828 — Daily drift detection for the Cloudflare firewall invariants
# established by Tasks #825 (OWASP 949110 trip-rule disable + leaked-credential
# rate-limit demotion) and #826 (path-scoped bot-management Skip rule for
# /api/* and /sitemap.xml).
#
# What this runs
# --------------
# 1. `python3 scripts/cf_waf_override.py verify`   — asserts the 5 steady-state
#    invariants of §8.7.4 (managed-ruleset bindings on action=execute, OWASP
#    trip-rule still disabled, leaked-credential RL on managed_challenge, and
#    the bot-skip Skip rule still present and enabled).
# 2. `python3 scripts/cf_waf_override.py aggregate --rule-id 874a3e... --hours 24`
#    — the path-aware 24h post-fix gate of §8.7.6 (challenge-style events on
#    exempt paths fail the gate; non-exempt activity is informational).
#
# Both subcommands today are run by hand (per the runbook). Without a daily
# scheduled invocation, drift introduced via the Cloudflare dashboard
# (a teammate re-enabling 949110, deleting the bot-skip Skip rule, etc.) only
# surfaces when a user complains. This workflow catches it within 24h.
#
# Alerting
# --------
# - Successful runs are silent (no Slack post, no email).
# - On `verify` rc != 0 OR `aggregate` rc != 0 (rc 1 = drift, rc 2 = config /
#   network error), the job posts a single Slack message to the webhook in
#   secret `CF_WAF_DRIFT_SLACK_WEBHOOK` and then fails the workflow itself
#   (so GitHub's built-in failed-workflow email goes to repo admins as a
#   secondary signal).
# - If `CF_WAF_DRIFT_SLACK_WEBHOOK` is not configured the Slack step is a
#   no-op with a `::warning::` annotation and the job still fails on the
#   final step — the GitHub Actions failed-run email then carries the full
#   captured `verify` / `aggregate` output via the run log.
#
# Required repo secrets
# ---------------------
#   CF_WAF_OVERRIDE_TOKEN       Cloudflare API token with the scopes listed
#                               in cf_waf_override.py's module docstring
#                               (Zone:Read, WAF:Edit, Account Rulesets:Edit,
#                               Zone Analytics:Read).
#   CF_ZONE_ID                  syrabit.ai zone id (same value the analytics
#                               token already uses).
#
# Optional repo secret
# --------------------
#   CF_WAF_DRIFT_SLACK_WEBHOOK    Slack incoming-webhook URL. When unset,
#                                 the job still fails on drift (GitHub
#                                 email path) but no Slack message is sent.
#   CF_WAF_DRIFT_HEARTBEAT_SECRET Shared secret for the backend heartbeat
#                                 (Task #831). Same value as the backend
#                                 env var. When unset the heartbeat step
#                                 is a no-op `::warning::` and the silent-
#                                 cron alerter cannot tell the workflow
#                                 ran — set this in tandem with the
#                                 backend env var on Railway/Cloud Run.
#
# Optional repo variable
# ----------------------
#   CF_WAF_DRIFT_BACKEND_URL    Override https://api.syrabit.ai for the
#                               heartbeat POST (e.g. staging refreshes).
#
# Setup is documented in docs/CLOUDFLARE_ZERO_TRUST.md §8.7.7.

on:
  schedule:
    # 04:47 UTC daily — offset off both 03:17 (edge-cache-live) and 04:30
    # (trustpilot-aggregate-refresh) so a Slack burst from one workflow
    # doesn't bury this one, and so we dodge GitHub's top-of-hour cron
    # stampede.
    - cron: "47 4 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "aggregate lookback window (hours, default 24)"
        required: false
        default: "24"
      rule_id:
        description: "rule id passed to `aggregate` (default = Task #826 bot rule)"
        required: false
        default: "874a3e315c344b1281ad4f00046aab6f"

# Read-only token: this job reads the repo, calls the Cloudflare API
# (auth via repo secrets, not the `GITHUB_TOKEN`), and posts a Slack
# webhook. It never needs to write back to the repo or open PRs.
permissions:
  contents: read

jobs:
  drift-check:
    name: cf_waf_override verify + aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: artifacts/syrabit-backend

    env:
      CF_WAF_OVERRIDE_TOKEN: ${{ secrets.CF_WAF_OVERRIDE_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      AGGREGATE_HOURS: ${{ github.event.inputs.hours || '24' }}
      AGGREGATE_RULE_ID: ${{ github.event.inputs.rule_id || '874a3e315c344b1281ad4f00046aab6f' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after the
          # checkout. This job does not push back to the repo (it calls
          # the Cloudflare API and a Slack webhook with their own
          # secrets), so persisting credentials would only widen the
          # blast radius of an accidental .git/ artifact upload.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Guard required secrets
        # Fail fast with a clear message if the cron rolled out before the
        # operator added the secrets, instead of an opaque "401 Unauthorized"
        # from Cloudflare 30 lines deeper.
        run: |
          set -e
          missing=""
          if [ -z "${CF_WAF_OVERRIDE_TOKEN:-}" ]; then
            missing="$missing CF_WAF_OVERRIDE_TOKEN"
          fi
          if [ -z "${CF_ZONE_ID:-}" ]; then
            missing="$missing CF_ZONE_ID"
          fi
          if [ -n "$missing" ]; then
            echo "::error title=Missing secrets::Required repo secrets not configured:$missing"
            echo "Add them in Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: Run verify (5 invariants — §8.7.4)
        id: verify
        # `set +e` so we capture the non-zero exit without aborting the job —
        # we want both `verify` and `aggregate` results in one Slack message
        # rather than failing fast and hiding the second signal.
        run: |
          set +e
          python3 scripts/cf_waf_override.py verify | tee /tmp/cf_verify.out
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" != "0" ]; then
            echo "::error title=verify drift::cf_waf_override.py verify exited rc=$rc"
          else
            echo "::notice title=verify::all 5 invariants hold"
          fi
          exit 0

      - name: Run aggregate (24h post-fix gate — §8.7.6)
        id: aggregate
        run: |
          set +e
          python3 scripts/cf_waf_override.py aggregate \
            --rule-id "$AGGREGATE_RULE_ID" \
            --hours "$AGGREGATE_HOURS" | tee /tmp/cf_aggregate.out
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          case "$rc" in
            0) echo "::notice title=aggregate::fix held (no challenge-style events on exempt paths)" ;;
            1) echo "::error title=aggregate drift::challenge-style events on exempt paths — Skip rule did NOT take effect" ;;
            2) echo "::error title=aggregate transport::CF GraphQL config / network error (rc=2) — re-run will likely succeed" ;;
            *) echo "::error title=aggregate unknown::cf_waf_override.py aggregate exited rc=$rc" ;;
          esac
          exit 0

      - name: Post Slack alert on failure
        if: ${{ steps.verify.outputs.rc != '0' || steps.aggregate.outputs.rc != '0' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CF_WAF_DRIFT_SLACK_WEBHOOK }}
          VERIFY_RC: ${{ steps.verify.outputs.rc }}
          AGGREGATE_RC: ${{ steps.aggregate.outputs.rc }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning title=Slack alert skipped::CF_WAF_DRIFT_SLACK_WEBHOOK not configured. Job will still fail in the final step so the GitHub failed-workflow email goes out, but configure the webhook to surface this in Slack."
            exit 0
          fi
          # Last 1500 chars per output keeps the Slack payload well under the
          # 40k-char limit even when both outputs are present.
          verify_tail=$(tail -c 1500 /tmp/cf_verify.out 2>/dev/null || echo "(no output captured)")
          aggregate_tail=$(tail -c 1500 /tmp/cf_aggregate.out 2>/dev/null || echo "(no output captured)")
          payload=$(jq -n \
            --arg vrc "$VERIFY_RC" \
            --arg arc "$AGGREGATE_RC" \
            --arg run "$RUN_URL" \
            --arg vtail "$verify_tail" \
            --arg atail "$aggregate_tail" \
            '{
              text: ":rotating_light: Cloudflare firewall drift detected (Task #828 daily check)",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (":rotating_light: *Cloudflare firewall drift detected*\n"
                      + "`verify` rc=`" + $vrc + "`, `aggregate` rc=`" + $arc + "`\n"
                      + "<" + $run + "|GitHub Actions run>\n"
                      + "Runbook: `docs/CLOUDFLARE_ZERO_TRUST.md` §8.7.4 (verify) / §8.7.6 (aggregate)")
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*verify output (last 1500 chars)*\n```\n" + $vtail + "\n```")
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*aggregate output (last 1500 chars)*\n```\n" + $atail + "\n```")
                  }
                }
              ]
            }')
          http_code=$(curl -sS -o /tmp/slack_body -w '%{http_code}' \
            -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --max-time 15 --retry 2 --retry-delay 5 \
            -d "$payload")
          echo "[slack] http=$http_code body=$(cat /tmp/slack_body 2>/dev/null | head -c 200)"
          if [ "$http_code" != "200" ]; then
            echo "::warning title=Slack alert failed::Slack webhook returned HTTP $http_code (job will still fail at the final step so the GitHub email goes out)"
          fi
          exit 0

      - name: Heartbeat to backend (Task #831)
        # Always run, even if earlier steps failed — the whole point of
        # this heartbeat is to distinguish "the firewall is drifting"
        # (workflow ran, Slack alert fired) from "the cron is silent"
        # (workflow didn't run at all). The backend's >36h silence
        # alerter only fires when no heartbeat arrives, so we MUST
        # send one even when verify/aggregate failed.
        #
        # Reduces (verify_rc, aggregate_rc) → status string the backend
        # records:
        #   * (0, 0)              → success      (clean pass)
        #   * (1, *) or (*, 1)    → drift        (per-run Slack alert
        #                                          already covered this;
        #                                          heartbeat just proves
        #                                          the cron ran)
        #   * (2, *) or (*, 2)    → transport_error (CF GraphQL/network
        #                                            transient — re-run
        #                                            will likely succeed)
        #   * unset / other       → failure      (workflow plumbing
        #                                          itself broke before
        #                                          producing an rc)
        if: always()
        env:
          CF_WAF_DRIFT_HEARTBEAT_SECRET: ${{ secrets.CF_WAF_DRIFT_HEARTBEAT_SECRET }}
          BACKEND_URL: ${{ vars.CF_WAF_DRIFT_BACKEND_URL || 'https://api.syrabit.ai' }}
          VERIFY_RC: ${{ steps.verify.outputs.rc }}
          AGGREGATE_RC: ${{ steps.aggregate.outputs.rc }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/cf-waf-drift-daily.yml
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          if [ -z "${CF_WAF_DRIFT_HEARTBEAT_SECRET:-}" ]; then
            echo "::warning title=Heartbeat::CF_WAF_DRIFT_HEARTBEAT_SECRET not set — skipping backend heartbeat. The silent-cron alerter (Task #831) will treat this workflow as silent if the secret stays unset for >36h on the backend side."
            exit 0
          fi
          # Decide status. Treat unset rc (step skipped/cancelled) as
          # failure — that's still a real workflow run we need to log,
          # and the heartbeat itself proves the cron is alive.
          STATUS="failure"
          if [ -n "${VERIFY_RC:-}" ] && [ -n "${AGGREGATE_RC:-}" ]; then
            if [ "$VERIFY_RC" = "2" ] || [ "$AGGREGATE_RC" = "2" ]; then
              STATUS="transport_error"
            elif [ "$VERIFY_RC" = "1" ] || [ "$AGGREGATE_RC" = "1" ]; then
              STATUS="drift"
            elif [ "$VERIFY_RC" = "0" ] && [ "$AGGREGATE_RC" = "0" ]; then
              STATUS="success"
            fi
          fi
          payload=$(jq -n \
            --arg s "$STATUS" \
            --arg vrc "${VERIFY_RC:-}" \
            --arg arc "${AGGREGATE_RC:-}" \
            --arg run "$RUN_URL" \
            --arg wf  "$WORKFLOW_URL" \
            --arg id  "$RUN_ID" \
            '{status:$s, verifyRc:$vrc, aggregateRc:$arc,
              runUrl:$run, workflowUrl:$wf, runId:$id}')
          http_code=$(curl -sS -o /tmp/cfw_hb_body -w '%{http_code}' \
            -X POST "${BACKEND_URL%/}/api/config/cf-waf-drift/heartbeat" \
            -H 'Content-Type: application/json' \
            -H "X-CF-WAF-Drift-Secret: ${CF_WAF_DRIFT_HEARTBEAT_SECRET}" \
            --max-time 15 --retry 2 --retry-delay 5 \
            -d "$payload")
          echo "[heartbeat] status=$STATUS http=$http_code body=$(cat /tmp/cfw_hb_body 2>/dev/null | head -c 300)"
          if [ "$http_code" != "200" ]; then
            echo "::warning title=Heartbeat::backend heartbeat returned $http_code (non-fatal — verify/aggregate result is the source of truth for this run)"
          fi
          exit 0

      - name: Fail job if any check failed
        if: ${{ steps.verify.outputs.rc != '0' || steps.aggregate.outputs.rc != '0' }}
        env:
          # Task #906 — pass the rc values through env vars rather than
          # direct ${{ ... }} interpolation into the shell. The values
          # come from our own scripts (numeric exit codes), but env-var
          # indirection means a future change to either script can never
          # escape into a different shell command.
          VERIFY_RC: ${{ steps.verify.outputs.rc }}
          AGGREGATE_RC: ${{ steps.aggregate.outputs.rc }}
        run: |
          echo "verify rc=${VERIFY_RC}, aggregate rc=${AGGREGATE_RC}"
          exit 1
