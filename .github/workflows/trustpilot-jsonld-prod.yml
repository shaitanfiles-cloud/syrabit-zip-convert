name: trustpilot-jsonld-prod

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes (Task #905): every workflow declares an explicit
# top-level `permissions:` block granting only the `GITHUB_TOKEN` scopes its
# jobs actually need — read-only by default. Omitting `permissions:` falls
# back to the repo default (`contents: write`), which would defeat the
# SHA-pinning hardening if a pinned action were ever compromised.
#
# Task #748 — second half of the gate.
#
# The build-time check (artifacts/syrabit/scripts/build.mjs step 5a.1)
# already fails Cloudflare Pages builds when the inject step does not
# land the AggregateRating JSON-LD on every Task #729 target path.
# That catches code/config regressions in the static dist/ output.
#
# It does NOT catch a backend regression that strips the tag at
# runtime — e.g. an edge worker rewriting <head>, an HTML-modifying
# transform on Cloudflare, or a CDN cache pinned to a stale build.
# This scheduled job hits the live origin once a day with a Googlebot
# UA and fails (notifying the on-call via the standard GitHub Actions
# failure channel) when any of the target paths is missing the rating.
#
# Cron: 06:00 UTC daily — early enough that a regression caught here
# is fixable inside the same business day before Google's next crawl.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "artifacts/syrabit/scripts/verify-trustpilot-jsonld.mjs"
      - ".github/workflows/trustpilot-jsonld-prod.yml"

# Read-only token: this job checks out the repo, hits the live origin
# with a Googlebot UA, posts a report to the backend (auth via the
# TRUSTPILOT_REFRESH_SECRET, not the `GITHUB_TOKEN`), and uploads a
# run-scoped artifact. It never writes back to the repo or opens PRs.
permissions:
  contents: read

jobs:
  verify-prod:
    name: Verify https://syrabit.ai AggregateRating
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. This job hits the live origin, posts to the
          # backend (auth via TRUSTPILOT_REFRESH_SECRET), and uploads a
          # JSON report (no .git/), so persisting credentials would only
          # widen the blast radius of an accidental .git/ artifact upload.
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      # Task #750 — write the report to disk first (does NOT fail the
      # job on its own; we still want the JSON to upload + the dashboard
      # to update even when verification failed). The "Fail job" step
      # below re-asserts the verifier's exit code so the existing pager
      # behaviour is unchanged.
      - name: Verify Trustpilot JSON-LD on production origin
        id: verify
        continue-on-error: true
        env:
          TARGET_ORIGIN: "https://syrabit.ai"
        run: |
          set +e
          node artifacts/syrabit/scripts/verify-trustpilot-jsonld.mjs \
            --target=remote \
            --json-out=trustpilot-jsonld-report.json
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      # Task #750 — surface the per-URL pass/fail table on the admin
      # dashboard so ops/marketing notice a regression in the same
      # place they already check delivery + alert health, not just in
      # the GitHub Actions failure email engineering watches. The POST
      # is best-effort: if the backend is down we still upload the
      # artifact below and the verifier exit code still pages on-call.
      - name: Push report to admin dashboard
        if: always() && hashFiles('trustpilot-jsonld-report.json') != ''
        env:
          BACKEND_URL: ${{ vars.TRUSTPILOT_BACKEND_URL || 'https://api.syrabit.ai' }}
          TRUSTPILOT_REFRESH_SECRET: ${{ secrets.TRUSTPILOT_REFRESH_SECRET }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TRUSTPILOT_REFRESH_SECRET" ]; then
            echo "::warning title=Trustpilot dashboard push skipped::TRUSTPILOT_REFRESH_SECRET not configured — admin tile will stay stale"
            exit 0
          fi
          # Splice runUrl into the JSON without needing jq/python deps.
          node -e '
            const fs = require("fs");
            const r = JSON.parse(fs.readFileSync("trustpilot-jsonld-report.json", "utf8"));
            r.runUrl = process.env.GH_RUN_URL || null;
            fs.writeFileSync("trustpilot-jsonld-report.json", JSON.stringify(r));
          '
          http_code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "${BACKEND_URL%/}/api/admin/trustpilot-jsonld/report" \
            -H "Content-Type: application/json" \
            -H "X-Trustpilot-Refresh-Secret: ${TRUSTPILOT_REFRESH_SECRET}" \
            --data-binary @trustpilot-jsonld-report.json) || true
          echo "POST ${BACKEND_URL%/}/api/admin/trustpilot-jsonld/report -> HTTP ${http_code}"
          cat /tmp/resp.txt || true
          if [ "$http_code" != "200" ]; then
            echo "::warning title=Trustpilot dashboard push failed::backend returned HTTP ${http_code}"
          fi

      # Belt-and-braces — keep the JSON downloadable from the run page
      # even when the dashboard push succeeds, so an engineer debugging
      # a failure can grab the raw report without DB access.
      - name: Upload report as build artifact
        if: always() && hashFiles('trustpilot-jsonld-report.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trustpilot-jsonld-report
          path: trustpilot-jsonld-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Fail job if verifier reported a regression
        if: ${{ steps.verify.outputs.rc != '0' }}
        env:
          # Task #906 — pass the verify step's rc through an env var
          # rather than direct ${{ ... }} interpolation into the shell.
          # The value is a numeric exit code we wrote ourselves, but
          # env-var indirection means a future change can never escape
          # into a different shell command (template-injection class).
          VERIFY_RC: ${{ steps.verify.outputs.rc }}
        run: |
          echo "verify-trustpilot-jsonld.mjs exited with rc=${VERIFY_RC}"
          exit 1
