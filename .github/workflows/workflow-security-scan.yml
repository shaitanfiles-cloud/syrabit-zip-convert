name: workflow-security-scan

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes (Task #905): every workflow declares an explicit
# top-level `permissions:` block granting only the `GITHUB_TOKEN` scopes its
# jobs actually need — read-only by default. Omitting `permissions:` falls
# back to the repo default (`contents: write`), which would defeat the
# SHA-pinning hardening if a pinned action were ever compromised.
#
# Task #906 — Catch the rest of the GitHub-Actions security footguns the
# `pinned-actions-check` gate (Task #895) is silent on.
#
# Task #883 / #895 / #905 hardened three specific axes of the supply chain:
# (a) every `uses:` ref is SHA-pinned, (b) a CI gate enforces (a) on every
# PR, and (c) the `GITHUB_TOKEN` is least-privilege. They do NOT catch the
# broader class of CI/Actions footguns:
#
#   - `workflow_run` / `pull_request_target` triggers handing the
#     write-scoped `GITHUB_TOKEN` to forked-PR code.
#   - Script-injection sinks where untrusted input
#     (`${{ github.event.pull_request.title }}`, `${{ github.head_ref }}`,
#     etc.) is interpolated directly into a `run:` shell block — the
#     GitHub-Actions equivalent of an XSS sink.
#   - Cache-poisoning patterns (`actions/cache` keyed off PR-controlled
#     input that subsequent runs unwittingly trust).
#   - `actions/checkout` with `persist-credentials: true` left on jobs
#     that never push back, so the `GITHUB_TOKEN` ends up sitting in
#     `.git/config` for any later `actions/upload-artifact` step to glob
#     in and exfiltrate.
#   - Dangling self-hosted-runner labels.
#   - `secrets.<name>` interpolated unredacted into log output.
#   - Known-vulnerable third-party action versions.
#
# This workflow runs `zizmor` (Trail of Bits' purpose-built linter for
# GitHub Actions) on every PR to `master` and fails the merge on any
# finding of severity HIGH or above. Lower-severity findings are surfaced
# in the run log for visibility but do not block — see `.github/zizmor.yml`
# for the per-rule justification on findings that are intentionally
# suppressed (none today; the entire workflow tree is clean at default
# severity as of this task).
#
# Why pip + hash-pin and not the official zizmor-action
# -----------------------------------------------------
# Pinning a third-party Action gets us SHA-locked code, but the action
# still pulls a wheel from PyPI inside the runner. Doing the install
# step ourselves with `pip install --require-hashes` against a
# pinned-version requirements file removes one extra hop — every single
# byte that runs against our workflow tree is hash-locked to a value we
# can audit in this file. Bumping zizmor is then a one-line change:
# update the version + sha256 below.
#
# Why two hashes
# --------------
# `--require-hashes` matches the wheel `pip` actually downloads to a
# hash on disk, so we must list both the manylinux x86_64 wheel (what
# ubuntu-latest will resolve) AND the sdist fallback (in case PyPI
# briefly serves only the sdist). Either resolved file matches one
# of the listed hashes; an attacker swapping the wheel mid-flight
# trips the `--require-hashes` check and fails the install.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Read-only token: this job greps every workflow file and runs the
# linter. It does not push back to the repo, comment on PRs, or
# upload artifacts.
permissions:
  contents: read

jobs:
  zizmor-scan:
    name: zizmor — workflow-security scan (HIGH+ blocks merge)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. This job only reads workflow files; it never
          # pushes back to the repo, so credentials are not needed
          # afterwards. (And, fittingly, this is one of the very
          # findings zizmor itself flags as `artipacked`.)
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install zizmor (hash-pinned)
        # Task #906 — every byte of zizmor that runs against our
        # workflow tree is hash-locked. Bumping the version is a
        # one-line change: update both the version on the `zizmor==`
        # line and the sha256 list below (look them up at
        # https://pypi.org/project/zizmor/<version>/#files).
        run: |
          set -euo pipefail
          cat > /tmp/zizmor-requirements.txt <<'EOF'
          zizmor==1.24.1 \
              --hash=sha256:73083efc7a65e5a58f4439dd781cdcb0394b05a3750e664c7f7e414589dc49b1 \
              --hash=sha256:54ebb7a7061ebaa3a373126dcbafe970c9228fe274cfc40776a9714d2095b5e6
          EOF
          python -m pip install --require-hashes --no-deps -r /tmp/zizmor-requirements.txt
          zizmor --version

      - name: Run zizmor (HIGH+ fails the build; informational findings stay in the log)
        # `--min-severity high` is the merge gate. Findings below that
        # threshold (medium, low, informational) print but do not fail
        # the build — they're triaged-via-PR-comment, not blocked.
        # Per-finding suppressions, when needed, live in
        # .github/zizmor.yml with a `# justification:` comment so the
        # next reviewer can tell intentional suppressions apart from
        # accidental ones. The whole workflow tree is clean today at
        # default severity (no suppressions), so any new finding ANY
        # reviewer adds is immediately visible in the run log.
        run: |
          set -euo pipefail
          # `--no-progress` keeps the GitHub log readable.
          # The `info` log line `zizmor v1.24.1` is reassuring but
          # noisy on every run — leave it on so a future zizmor bump
          # is visible at a glance during PR review.
          zizmor --no-progress .github/workflows/

      - name: Run zizmor again, gated at HIGH severity (the actual merge gate)
        # The previous step prints every finding for visibility.
        # This step re-runs with `--min-severity=high` so the build
        # only fails when HIGH or above is present. Per the task
        # spec: start strict — every HIGH+ finding must be either
        # fixed in the workflow file or explicitly justified in
        # `.github/zizmor.yml`. The current tree is fully clean at
        # this gate.
        run: |
          set -euo pipefail
          zizmor --no-progress --min-severity=high .github/workflows/
