name: grounded-recall-nightly

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #587 — explicit ops scheduling artifact for the nightly grounded
# recall benchmark. Belt-and-suspenders alongside the in-process loop
# in server.py: if the backend is down (mid-deploy, restarting, etc.)
# during the ±30 min window the in-process loop targets, this Action
# guarantees the nightly run still happens and the admin tile / alert
# pipeline stay observable.
#
# Strategy
# --------
# We run the *offline* bench against the committed fixture in CI on a
# nightly cron. The offline bench is hermetic (no network, no prod
# secrets) but exercises the exact same `_build_citations` code path,
# so a code regression in the citation builder pages on-call before
# the live job ever runs. The live `--gate` failures still come from
# the in-process loop, which has access to the production retrievers
# and DB-backed alert dispatcher.
#
# Two triggers:
#   - schedule: 04:30 UTC every day (offset from the in-process loop's
#     03:00 UTC slot so a regression caught here lands in admin email
#     alongside, not on top of, the live one).
#   - workflow_dispatch: manual run from the Actions tab when ops want
#     to re-baseline or sanity-check after editing the fixture.

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "artifacts/syrabit-backend/bench/**"
      - "artifacts/syrabit-backend/grounded_answer.py"
      - ".github/workflows/grounded-recall-nightly.yml"

jobs:
  grounded-recall:
    name: Offline grounded-recall gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: artifacts/syrabit-backend

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: artifacts/syrabit-backend/requirements.txt

      - name: Install runtime deps the bench needs
        # The bench imports `grounded_answer._build_citations` which has
        # a small dependency surface; install the full requirements so
        # the import path matches production.
        run: pip install -r requirements.txt

      - name: Run grounded-recall benchmark (offline, gated against baseline)
        run: |
          python -m bench.grounded_recall \
            --save-results \
            --compare-baseline \
            --gate 0.05

      - name: Upload bench results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: grounded-recall-results
          path: artifacts/syrabit-backend/bench/results/
          if-no-files-found: ignore
          retention-days: 14
