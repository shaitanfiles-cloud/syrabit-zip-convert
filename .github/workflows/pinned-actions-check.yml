name: pinned-actions-check

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #895 — Self-enforcing gate for the SHA-pinning hardening from Task #883.
#
# Task #883 pinned every `uses:` line in .github/workflows/*.yml to a 40-char
# commit SHA, but that pinning was reviewer-discipline only: a future PR could
# silently re-introduce `uses: actions/checkout@v4` and the hardening would
# regress without anyone noticing. This workflow grep-checks every `uses:` line
# on each PR and fails the merge unless the ref matches `@[a-f0-9]{40}`. The
# job is itself pinned to a SHA (no bootstrapping float tag) and is wired as a
# required check on the master branch protection rule.
#
# Dependabot's weekly bump PRs (.github/dependabot.yml) flip both the SHA and
# the trailing `# vX.Y.Z` comment in lockstep, so they pass this gate without
# any allow-list — the new SHA is still 40 hex chars.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  pinned-actions-check:
    name: Verify all uses refs are SHA-pinned
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify SHA-pinned `uses:` references
        run: |
          set -euo pipefail

          # Grep every `uses:` line in every workflow file. Comment lines
          # (starting with `#`) are skipped by the leading-whitespace anchor.
          # The optional `-` prefix matches both list-item form
          # (`- uses: foo@SHA`) and mapping form (`  uses: foo@SHA`).
          shopt -s nullglob
          files=(.github/workflows/*.yml .github/workflows/*.yaml)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files found under .github/workflows/ — nothing to check."
            exit 0
          fi

          violations=0
          while IFS= read -r line; do
            # Each line is `path:lineno:content`.
            file="${line%%:*}"
            rest="${line#*:}"
            lineno="${rest%%:*}"
            content="${rest#*:}"

            # Strip the `uses:` prefix, any trailing `# comment`, and any
            # surrounding quotes so we get the raw action reference.
            value=$(printf '%s' "$content" \
              | sed -E 's/^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+//' \
              | sed -E 's/[[:space:]]*#.*$//' \
              | sed -E 's/^["'"'"']//; s/["'"'"']$//')

            # Allow local composite-action refs (`./.github/actions/foo`) and
            # docker image refs (`docker://image:tag`) — neither uses the
            # GitHub-action `@<ref>` syntax that the float-tag attack targets.
            case "$value" in
              ''|./*|docker://*) continue ;;
            esac

            # Everything else must be `<owner>/<repo>(/path)?@<40-hex-sha>`.
            if ! [[ "$value" =~ @[a-fA-F0-9]{40}$ ]]; then
              echo "::error file=${file},line=${lineno}::Unpinned action ref '${value}'. Pin to a 40-char commit SHA (e.g. \`gh api repos/<owner>/<repo>/git/refs/tags/<tag> --jq .object.sha\`). See the supply-chain header comment block at the top of this workflow file for the rationale (Task #883) and the upgrade procedure."
              violations=$((violations+1))
            fi
          done < <(grep -EnH '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+' "${files[@]}" || true)

          if [ "$violations" -gt 0 ]; then
            echo ""
            echo "Found ${violations} unpinned action reference(s)."
            echo ""
            echo "Every \`uses:\` in .github/workflows/ must reference a 40-char"
            echo "commit SHA, with a trailing '# vX.Y.Z' tag comment for"
            echo "readability. Float tags (e.g. @v4, @main) are forbidden because"
            echo "a compromise of the upstream tag would silently exfiltrate this"
            echo "repo's secrets on the next workflow run."
            echo ""
            echo "See the supply-chain header comment block at the top of any"
            echo "workflow file for the upgrade procedure (Task #883), or"
            echo "replit.md → 'GitHub Actions supply-chain hardening'."
            exit 1
          fi

          echo "OK: all \`uses:\` references in .github/workflows/ are SHA-pinned."
