# Supply-chain hardening companion to dependabot.yml (Task #883) and the
# SHA-pinning policy enforced by pinned-actions-check.yml.
#
# When Dependabot opens a PR that bumps a GitHub Actions dependency (the only
# ecosystem configured in dependabot.yml), this workflow:
#   1. Waits for all required status checks to pass (enforced by GitHub branch
#      protection — configure required checks in Settings → Branches → master).
#   2. Auto-approves the PR using the built-in GITHUB_TOKEN (approved by a
#      machine account so human reviewers can still spot-check the SHA).
#   3. Enables "squash merge" auto-merge so GitHub merges as soon as the
#      protection rules are satisfied.
#
# Security notes:
#   * Only Dependabot-authored PRs trigger this workflow (the `if:` guard on
#     each job checks `github.actor == 'dependabot[bot]'`).
#   * The PR must already carry the `github-actions` label (set in
#     dependabot.yml) — without it the `ecosystem-filter` job exits cleanly.
#   * The workflow runs on `pull_request_target` (not `pull_request`) so the
#     GITHUB_TOKEN has the scopes it needs to approve and merge.  Dependabot
#     PRs are fork-equivalent by default, so `pull_request` would only get a
#     read-only token and couldn't approve or enable auto-merge.
#   * `pull-requests: write` + `contents: write` are the minimum scopes
#     needed for `gh pr review --approve` + `gh pr merge --auto`.
#
# To upgrade an action used in THIS file: look up the SHA for the new tag and
# replace both the SHA and the trailing `# vX.Y.Z` comment.
#
# Required repo permission (now that token edit is granted):
#   Settings → Actions → General → Workflow permissions →
#   "Read and write permissions" must be enabled so GITHUB_TOKEN can approve
#   and merge PRs.  Without this the `auto-approve` and `auto-merge` steps
#   will fail with a 403.

# zizmor: pull_request_target is required so the GITHUB_TOKEN has the
# write scopes needed to approve and enable auto-merge on Dependabot PRs.
# Plain `pull_request` only grants a read-only token to fork-equivalent
# events (Dependabot is fork-equivalent), which is why this is the
# documented pattern in https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions.
# Risk is mitigated by:
#   * Strict actor guard via github.event.pull_request.user.login (not spoofable
#     like github.actor in pull_request_target).
#   * Permissions scoped to the jobs that need them (not the workflow root).
#   * No checkout of PR-controlled code in any job — we only call `gh pr ...`.
on:
  pull_request_target:  # zizmor: ignore[dangerous-triggers]
    types: [opened, synchronize, reopened, ready_for_review]

# Default workflow permissions: read-only. Per-job permissions below grant the
# minimum write scopes required, satisfying zizmor[excessive-permissions].
permissions:
  contents: read

jobs:
  ecosystem-filter:
    name: Filter to github-actions ecosystem PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Use pull_request.user.login (not github.actor) — github.actor on
    # pull_request_target reflects whoever last touched the PR and is spoofable
    # by anyone with push to a feature branch. The PR author field is set by
    # GitHub at creation time and cannot be spoofed.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    outputs:
      is_actions_bump: ${{ steps.check.outputs.is_actions_bump }}
    steps:
      - name: Check labels
        id: check
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | python3 -c "import sys,json; labels=json.load(sys.stdin); sys.exit(0 if 'github-actions' in labels else 1)"; then
            echo "is_actions_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_actions_bump=false" >> "$GITHUB_OUTPUT"
          fi

  auto-approve:
    name: Approve Dependabot actions PR
    needs: ecosystem-filter
    if: needs.ecosystem-filter.outputs.is_actions_bump == 'true'
    runs-on: ubuntu-latest
    # `gh pr review --approve` needs pull-requests: write only.
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --approve \
            --body "Auto-approved by dependabot-auto-merge workflow. SHA verified by Dependabot; spot-check recommended before the branch-protection gate merges."

  auto-merge:
    name: Enable auto-merge for Dependabot actions PR
    needs: [ecosystem-filter, auto-approve]
    if: needs.ecosystem-filter.outputs.is_actions_bump == 'true'
    runs-on: ubuntu-latest
    # `gh pr merge --auto` needs both contents: write (to merge) and
    # pull-requests: write (to enable auto-merge).
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            --subject "ci(deps): auto-merge Dependabot actions bump (#$PR_NUMBER)"
