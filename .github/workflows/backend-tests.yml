name: backend-tests

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #470 — Real CI gate for the backend test suite.
#
# Runs `pytest --cov` for the FastAPI backend on every push and PR. The
# coverage gate is enforced via `pyproject.toml`'s `fail_under = 60` so
# this workflow fails (and blocks merge to `master`) when:
#   * any test fails, or
#   * total coverage drops below 60%, or
#   * coverage drops more than 1 percentage point vs the merge base
#     (only on PRs — push builds skip the diff check).
#
# Configure branch protection on `master` to require this check before
# merging.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege defaults. The PR-coverage-comment step needs
# `pull-requests: write`, but on forked PRs GitHub downgrades the
# token to read-only — that step is also guarded with `continue-on-error`
# below so a permissions failure cannot turn an otherwise-green build red.
permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    name: pytest --cov
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: artifacts/syrabit-backend

    steps:
      - name: Checkout (with merge base for coverage diff)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. The base-branch fetch step below re-supplies the
          # token inline via `git -c http.extraheader=...` so the
          # coverage-diff flow keeps working on private repos without
          # leaving the token sitting on disk for the artifact-upload
          # step to glob into.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: artifacts/syrabit-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov coverage

      # Task #723 — Symmetric backend gate for the cf_access break-glass
      # contract. The full pytest run below also covers this file, but we
      # invoke it explicitly first with `-v` so the 31 individual test
      # names (including the Task #710 force-disable cases) are surfaced
      # in the CI log. That makes any rename/regression of e.g.
      # `break_glass_force_disabled` immediately visible in PR review,
      # matching the frontend gate added in Task #722.
      - name: cf_access break-glass tests (visible gate)
        id: cf_access
        env:
          MONGODB_URL: "mongodb://localhost:27017/test"
          DB_NAME: "syrabit_test"
          JWT_SECRET: "ci-test-secret-not-real"
        run: |
          pytest tests/test_cf_access.py -v --no-header

      - name: Run pytest with coverage gate
        id: pytest
        env:
          # Tests should not need real secrets; provide placeholders to
          # avoid import-time failures in modules that read os.environ.
          MONGODB_URL: "mongodb://localhost:27017/test"
          DB_NAME: "syrabit_test"
          JWT_SECRET: "ci-test-secret-not-real"
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml
          path: artifacts/syrabit-backend/coverage.xml
          if-no-files-found: warn

      # ───────── PR-only: comment when coverage drops > 1pp vs base ─────────
      - name: Compute base-branch coverage (PR only)
        if: github.event_name == 'pull_request'
        id: base_cov
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          # Task #906 — re-supply the GITHUB_TOKEN inline for this fetch
          # only. The initial checkout above runs with
          # `persist-credentials: false`, so .git/config no longer holds
          # the token after that step. We pass the token via
          # `git -c http.extraheader=...` here so the base-branch fetch
          # still works on private repos, but the token is never
          # written back to disk where a future artifact-upload could
          # glob it in.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          git -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" \
            fetch origin "$BASE_REF" --depth=1
          git worktree add /tmp/base-checkout "origin/$BASE_REF"
          cd /tmp/base-checkout/artifacts/syrabit-backend
          pip install -r requirements.txt >/dev/null 2>&1
          pytest --cov=. --cov-report=xml -q >/dev/null 2>&1
          BASE=$(python -c "import xml.etree.ElementTree as ET; \
            r=ET.parse('coverage.xml').getroot(); \
            print(round(float(r.attrib.get('line-rate','0'))*100,2))")
          echo "base_pct=$BASE" >> "$GITHUB_OUTPUT"
          cd -
          git worktree remove /tmp/base-checkout --force

      - name: Compute head coverage and diff
        if: github.event_name == 'pull_request'
        id: head_cov
        env:
          # Task #906 — pass the previous step's output through an env
          # var rather than direct ${{ ... }} interpolation. The value
          # is a number we computed ourselves, but env-var indirection
          # means a future change can never escape into a different
          # shell command (template-injection class).
          BASE_PCT: ${{ steps.base_cov.outputs.base_pct }}
        run: |
          HEAD=$(python -c "import xml.etree.ElementTree as ET; \
            r=ET.parse('coverage.xml').getroot(); \
            print(round(float(r.attrib.get('line-rate','0'))*100,2))")
          echo "head_pct=$HEAD" >> "$GITHUB_OUTPUT"
          DIFF=$(python -c "print(round(${HEAD} - ${BASE_PCT:-0}, 2))")
          echo "diff_pct=$DIFF" >> "$GITHUB_OUTPUT"

      # Only comment when coverage actually drops > 1pp — keeps PR
      # threads quiet on the common path. ``continue-on-error`` so a
      # downgraded fork-PR token can't fail an otherwise-green build.
      - name: Comment coverage drop on PR
        if: |
          github.event_name == 'pull_request' &&
          steps.head_cov.outputs.diff_pct != '' &&
          fromJSON(steps.head_cov.outputs.diff_pct) < -1
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          # Task #906 — pass step outputs through env vars rather than
          # direct ${{ ... }} interpolation into the inline script. The
          # values are numbers we computed ourselves, but env-var
          # indirection means a future change can never escape into
          # JavaScript code (template-injection class).
          HEAD_PCT: ${{ steps.head_cov.outputs.head_pct }}
          BASE_PCT: ${{ steps.base_cov.outputs.base_pct }}
          DIFF_PCT: ${{ steps.head_cov.outputs.diff_pct }}
        with:
          script: |
            const head = parseFloat(process.env.HEAD_PCT || "0");
            const base = parseFloat(process.env.BASE_PCT || "0");
            const diff = parseFloat(process.env.DIFF_PCT || "0");
            const sign = diff >= 0 ? "+" : "";
            const marker = "<!-- syrabit-backend-coverage-bot -->";
            const body = [
              marker,
              `⚠️ **Backend coverage dropped:** ${head.toFixed(2)}% (base ${base.toFixed(2)}%, ${sign}${diff.toFixed(2)}pp)`,
              "> Coverage dropped more than 1 percentage point vs the base branch — please add tests for the new code paths.",
            ].join("\n\n");
            // Upsert: replace the previous bot comment instead of stacking
            // a new one on every push so the PR thread stays clean.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if coverage dropped > 1pp on PR
        if: github.event_name == 'pull_request'
        env:
          # Task #906 — pass the diff through an env var rather than
          # direct ${{ ... }} interpolation. The value is a number we
          # computed ourselves, but env-var indirection means a future
          # change can never escape into a different shell command
          # (template-injection class).
          DIFF: ${{ steps.head_cov.outputs.diff_pct }}
        run: |
          python -c "import sys; d=float('$DIFF' or '0'); sys.exit(1 if d < -1.0 else 0)"
