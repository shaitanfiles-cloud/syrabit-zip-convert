name: backend-tests

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #470 — Real CI gate for the backend test suite.
#
# Runs `pytest --cov` for the FastAPI backend on every push and PR. The
# coverage gate is enforced via `pyproject.toml`'s `fail_under = 60` so
# this workflow fails (and blocks merge to `master`) when:
#   * any test fails, or
#   * total coverage drops below 60%, or
#   * coverage drops more than 1 percentage point vs the merge base
#     (only on PRs — push builds skip the diff check).
#
# Configure branch protection on `master` to require this check before
# merging.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege defaults. The PR-coverage-comment step needs
# `pull-requests: write`, but on forked PRs GitHub downgrades the
# token to read-only — that step is also guarded with `continue-on-error`
# below so a permissions failure cannot turn an otherwise-green build red.
permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    name: pytest --cov
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: artifacts/syrabit-backend

    steps:
      - name: Checkout (with merge base for coverage diff)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. The base-branch fetch step below re-supplies the
          # token inline via `git -c http.extraheader=...` so the
          # coverage-diff flow keeps working on private repos without
          # leaving the token sitting on disk for the artifact-upload
          # step to glob into.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: artifacts/syrabit-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov coverage

      # Task #723 — Symmetric backend gate for the cf_access break-glass
      # contract. The full pytest run below also covers this file, but we
      # invoke it explicitly first with `-v` so the 31 individual test
      # names (including the Task #710 force-disable cases) are surfaced
      # in the CI log. That makes any rename/regression of e.g.
      # `break_glass_force_disabled` immediately visible in PR review,
      # matching the frontend gate added in Task #722.
      - name: cf_access break-glass tests (visible gate)
        id: cf_access
        env:
          MONGODB_URL: "mongodb://localhost:27017/test"
          DB_NAME: "syrabit_test"
          JWT_SECRET: "ci-test-secret-not-real"
        run: |
          pytest tests/test_cf_access.py -v --no-header

      - name: Run pytest with coverage gate
        id: pytest
        env:
          # Tests should not need real secrets; provide placeholders to
          # avoid import-time failures in modules that read os.environ.
          MONGODB_URL: "mongodb://localhost:27017/test"
          DB_NAME: "syrabit_test"
          JWT_SECRET: "ci-test-secret-not-real"
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      # ───────── Task #4 — fixture ↔ schema drift detection ─────────
      # Re-generate the OpenAPI JSON from the current FastAPI route
      # registry and compare it against the committed snapshot
      # (artifacts/syrabit/tests/api-schema.json).  Two levels checked:
      #
      #   1. Path set — added/renamed/removed endpoints are caught.
      #   2. Response-component schema deep diff — for every component
      #      schema referenced by a 200-response of a path present in
      #      both live and snapshot, a canonical structural fingerprint
      #      (type, required, properties with types, $ref, anyOf/allOf,
      #      items, nullable, enum) is computed and compared.  Changes to
      #      property types, newly-required fields, added/removed
      #      properties, and nullability changes are all caught here.
      #      Non-semantic fields (description, title, example) are
      #      stripped before comparison to avoid noise.
      #
      # If either comparison fails, developers are instructed to run:
      #
      #   python artifacts/syrabit-backend/scripts/export_api_schema.py
      #
      # and commit the updated api-schema.json alongside their changes.
      - name: Verify OpenAPI snapshot is current (fixture-schema drift)
        id: schema_drift
        working-directory: ${{ github.workspace }}
        run: |
          python artifacts/syrabit-backend/scripts/export_api_schema.py \
            /tmp/live-openapi.json
          python - <<'PYEOF'
          import json, sys

          live = json.load(open('/tmp/live-openapi.json'))
          snap = json.load(open('artifacts/syrabit/tests/api-schema.json'))

          # ── 1. Path-set comparison ────────────────────────────────────
          live_paths = set(live.get('paths', {}).keys())
          snap_paths = set(snap.get('paths', {}).keys())
          added_paths   = sorted(live_paths - snap_paths)
          removed_paths = sorted(snap_paths - live_paths)

          # ── 2. Response-component deep-type comparison ────────────────
          #
          # Collect component names referenced by 200-response bodies of
          # paths present in both live and snapshot.
          def response_component_refs(schema, path):
              refs = set()
              for method, op in schema.get('paths', {}).get(path, {}).items():
                  if not isinstance(op, dict):
                      continue
                  for ct in op.get('responses', {}).get('200', {}).get('content', {}).values():
                      ref = ct.get('schema', {}).get('$ref', '')
                      if ref.startswith('#/components/schemas/'):
                          refs.add(ref.split('/')[-1])
              return refs

          shared_paths = live_paths & snap_paths
          all_component_names = set()
          for p in shared_paths:
              all_component_names |= response_component_refs(live, p)
              all_component_names |= response_component_refs(snap, p)

          # Semantic fields we care about for drift detection.
          # Strip doc-only keys (description, title, example, examples)
          # to avoid false positives from docstring edits.
          SEMANTIC_KEYS = {
              'type', 'required', 'properties', '$ref',
              'anyOf', 'allOf', 'oneOf', 'items',
              'nullable', 'enum', 'additionalProperties',
          }

          def canonical(obj):
              """Recursively extract semantic structure for comparison.

              When the key is 'properties', its value is a field-name→schema
              map — field names are preserved (they are not semantic keys
              themselves) and each per-field schema is canonicalized.
              All other dict keys are filtered to SEMANTIC_KEYS so that
              doc-only fields (description, title, example) do not cause
              false-positive drift reports.
              """
              if isinstance(obj, dict):
                  result = {}
                  for k, v in obj.items():
                      if k not in SEMANTIC_KEYS:
                          continue
                      if k == 'properties' and isinstance(v, dict):
                          # v maps field-name → schema; preserve ALL field
                          # names but canonicalize each field's schema.
                          result[k] = {field: canonical(schema)
                                       for field, schema in v.items()}
                      else:
                          result[k] = canonical(v)
                  return result
              if isinstance(obj, list):
                  return [canonical(i) for i in obj]
              return obj

          component_diffs = []
          live_comps = live.get('components', {}).get('schemas', {})
          snap_comps = snap.get('components', {}).get('schemas', {})

          for name in sorted(all_component_names):
              live_canon = canonical(live_comps.get(name, {}))
              snap_canon = canonical(snap_comps.get(name, {}))
              if live_canon != snap_canon:
                  # Build a human-readable summary of what changed.
                  detail = []
                  live_req = set(live_canon.get('required', []))
                  snap_req = set(snap_canon.get('required', []))
                  if live_req != snap_req:
                      if live_req - snap_req:
                          detail.append(f'    new required fields: {sorted(live_req - snap_req)}')
                      if snap_req - live_req:
                          detail.append(f'    no longer required: {sorted(snap_req - live_req)}')
                  live_props = live_canon.get('properties', {})
                  snap_props = snap_canon.get('properties', {})
                  added_props   = sorted(set(live_props) - set(snap_props))
                  removed_props = sorted(set(snap_props) - set(live_props))
                  if added_props:
                      detail.append(f'    new properties: {added_props}')
                  if removed_props:
                      detail.append(f'    removed properties: {removed_props}')
                  for prop in sorted(set(live_props) & set(snap_props)):
                      if live_props[prop] != snap_props[prop]:
                          detail.append(
                              f'    "{prop}" type changed:\n'
                              f'      was: {json.dumps(snap_props[prop], sort_keys=True)}\n'
                              f'      now: {json.dumps(live_props[prop], sort_keys=True)}'
                          )
                  if not detail:
                      detail.append(f'    structural change (non-property level)')
                  component_diffs.append(f'  {name}:\n' + '\n'.join(detail))

          # ── Report ────────────────────────────────────────────────────
          if not added_paths and not removed_paths and not component_diffs:
              print(
                  f'[schema-drift] OK — {len(live_paths)} paths and '
                  f'{len(all_component_names)} response component schemas '
                  f'match the snapshot (types, required, properties).'
              )
              sys.exit(0)

          print('[schema-drift] FAIL — committed api-schema.json is out of date.')
          print('Run:  python artifacts/syrabit-backend/scripts/export_api_schema.py')
          print('Then commit the updated artifacts/syrabit/tests/api-schema.json.')

          if added_paths:
              print('\nNew backend paths not in snapshot:')
              for p in added_paths: print(f'  + {p}')
          if removed_paths:
              print('\nSnapshot paths no longer in backend:')
              for p in removed_paths: print(f'  - {p}')
          if component_diffs:
              print('\nResponse component schema changes (types/required/properties):')
              for d in component_diffs: print(d)

          sys.exit(1)
          PYEOF

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml
          path: artifacts/syrabit-backend/coverage.xml
          if-no-files-found: warn

      # ───────── PR-only: comment when coverage drops > 1pp vs base ─────────
      - name: Compute base-branch coverage (PR only)
        if: github.event_name == 'pull_request'
        id: base_cov
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          # Task #906 — re-supply the GITHUB_TOKEN inline for this fetch
          # only. The initial checkout above runs with
          # `persist-credentials: false`, so .git/config no longer holds
          # the token after that step. We pass the token via
          # `git -c http.extraheader=...` here so the base-branch fetch
          # still works on private repos, but the token is never
          # written back to disk where a future artifact-upload could
          # glob it in.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          git -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" \
            fetch origin "$BASE_REF" --depth=1
          git worktree add /tmp/base-checkout "origin/$BASE_REF"
          cd /tmp/base-checkout/artifacts/syrabit-backend
          pip install -r requirements.txt >/dev/null 2>&1
          pytest --cov=. --cov-report=xml -q >/dev/null 2>&1
          BASE=$(python -c "import xml.etree.ElementTree as ET; \
            r=ET.parse('coverage.xml').getroot(); \
            print(round(float(r.attrib.get('line-rate','0'))*100,2))")
          echo "base_pct=$BASE" >> "$GITHUB_OUTPUT"
          cd -
          git worktree remove /tmp/base-checkout --force

      - name: Compute head coverage and diff
        if: github.event_name == 'pull_request'
        id: head_cov
        env:
          # Task #906 — pass the previous step's output through an env
          # var rather than direct ${{ ... }} interpolation. The value
          # is a number we computed ourselves, but env-var indirection
          # means a future change can never escape into a different
          # shell command (template-injection class).
          BASE_PCT: ${{ steps.base_cov.outputs.base_pct }}
        run: |
          HEAD=$(python -c "import xml.etree.ElementTree as ET; \
            r=ET.parse('coverage.xml').getroot(); \
            print(round(float(r.attrib.get('line-rate','0'))*100,2))")
          echo "head_pct=$HEAD" >> "$GITHUB_OUTPUT"
          DIFF=$(python -c "print(round(${HEAD} - ${BASE_PCT:-0}, 2))")
          echo "diff_pct=$DIFF" >> "$GITHUB_OUTPUT"

      # Only comment when coverage actually drops > 1pp — keeps PR
      # threads quiet on the common path. ``continue-on-error`` so a
      # downgraded fork-PR token can't fail an otherwise-green build.
      - name: Comment coverage drop on PR
        if: |
          github.event_name == 'pull_request' &&
          steps.head_cov.outputs.diff_pct != '' &&
          fromJSON(steps.head_cov.outputs.diff_pct) < -1
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          # Task #906 — pass step outputs through env vars rather than
          # direct ${{ ... }} interpolation into the inline script. The
          # values are numbers we computed ourselves, but env-var
          # indirection means a future change can never escape into
          # JavaScript code (template-injection class).
          HEAD_PCT: ${{ steps.head_cov.outputs.head_pct }}
          BASE_PCT: ${{ steps.base_cov.outputs.base_pct }}
          DIFF_PCT: ${{ steps.head_cov.outputs.diff_pct }}
        with:
          script: |
            const head = parseFloat(process.env.HEAD_PCT || "0");
            const base = parseFloat(process.env.BASE_PCT || "0");
            const diff = parseFloat(process.env.DIFF_PCT || "0");
            const sign = diff >= 0 ? "+" : "";
            const marker = "<!-- syrabit-backend-coverage-bot -->";
            const body = [
              marker,
              `⚠️ **Backend coverage dropped:** ${head.toFixed(2)}% (base ${base.toFixed(2)}%, ${sign}${diff.toFixed(2)}pp)`,
              "> Coverage dropped more than 1 percentage point vs the base branch — please add tests for the new code paths.",
            ].join("\n\n");
            // Upsert: replace the previous bot comment instead of stacking
            // a new one on every push so the PR thread stays clean.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if coverage dropped > 1pp on PR
        if: github.event_name == 'pull_request'
        env:
          # Task #906 — pass the diff through an env var rather than
          # direct ${{ ... }} interpolation. The value is a number we
          # computed ourselves, but env-var indirection means a future
          # change can never escape into a different shell command
          # (template-injection class).
          DIFF: ${{ steps.head_cov.outputs.diff_pct }}
        run: |
          python -c "import sys; d=float('$DIFF' or '0'); sys.exit(1 if d < -1.0 else 0)"
