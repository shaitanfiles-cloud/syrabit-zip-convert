name: frontend-tests

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes (Task #905): every workflow declares an explicit
# top-level `permissions:` block granting only the `GITHUB_TOKEN` scopes its
# jobs actually need — read-only by default. Omitting `permissions:` falls
# back to the repo default (`contents: write`), which would defeat the
# SHA-pinning hardening if a pinned action were ever compromised.
#
# Task #470 — Real CI gate for the frontend.
#
# Runs the syrabit web artifact's unit tests + production build on every
# push and PR. Failure blocks merge to `master` so a green frontend can't
# mask a backend regression and vice-versa (each suite has its own
# required check on the branch protection rule).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Read-only token: this job checks out the repo, runs vitest in two
# packages, and produces a Vite build under each package's local dist/.
# It does not write back to the repo, publish packages, or open PRs.
permissions:
  contents: read

jobs:
  build-and-test:
    name: pnpm test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. This job runs vitest and a vite build; it does not
          # push back to the repo, so credentials are not needed
          # afterwards and persisting them would only widen the blast
          # radius of an accidental .git/ artifact upload.
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run edge worker tests (vitest)
        run: pnpm --filter ./workers/edge-proxy run test --run
        # vitest exit code is non-zero on failure → blocks the merge.

      - name: Run syrabit web unit tests (vitest)
        run: pnpm --filter @workspace/syrabit run test
        # Task #722 — gate the syrabit web suite (BreakGlassBanner,
        # pushChannelTone, highlightSegments, AdminEduBrowser,
        # AlertReasonsRow, …). vitest exits non-zero on failure so a
        # broken polled-field name or peer-dep churn blocks merge.

      - name: Build syrabit web artifact
        run: pnpm --filter @workspace/syrabit run build:vite-only || pnpm --filter @workspace/syrabit run build
        # Either build script works; we try the lighter `vite-only` first
        # so we don't pay for the full prerender on every PR.
