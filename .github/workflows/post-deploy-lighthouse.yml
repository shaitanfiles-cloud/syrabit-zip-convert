name: post-deploy-lighthouse

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
#
# Task #131 — Trigger a Cloudflare Observatory Lighthouse run after every
# production Pages deploy, not just weekly.
#
# Trigger: every push to master/main (the same branches Cloudflare Pages
# watches).  The job waits for the Pages deploy to reach "success" via the
# Cloudflare Pages API before firing Observatory speed tests, so Lighthouse
# always measures the live, freshly-deployed version.
#
# Pipeline:
#   push to master/main ──► wait-for-pages-deploy ──► lighthouse-check
#
# The lighthouse-check job runs scripts/post-deploy-lighthouse.js which:
#   1. Polls GET /accounts/{id}/pages/projects/syrabit-analytics/deployments
#      until the latest production deploy status is "success".
#   2. Fires POST /zones/{id}/speed/tests for homepage + chapter page.
#   3. Polls GET /zones/{id}/speed/tests?url={url} until results are available
#      (up to 10 min per page).
#   4. Fails (exit 1) if any of LCP>2.5 s, CLS>0.1, or INP>200 ms is breached.
#
# On breach the CI run is marked failed.  If branch protection requires this
# status check to pass before merging, the failing check blocks the next PR
# from being merged until the regression is fixed.  The current deploy is
# already live at this point (Pages deploys on push; this job runs in parallel)
# — the check gates *future* deploys, not the current one.
#
# Emergency bypass (hotfixes):
#   1. Trigger this workflow manually via the GitHub UI → "Run workflow" with
#      skip_lighthouse set to "true".
#   2. Or unprotect the branch temporarily, merge the hotfix, then restore.
#   See docs/CLOUDFLARE_OBSERVATORY.md → "Disabling for hotfixes" for details.
#
# Required repo secrets (Settings → Secrets and variables → Actions → Secrets):
#   CLOUDFLARE_API_TOKEN — must include:
#     Speed (Observatory): Edit   (trigger tests)
#     Speed (Observatory): Read   (poll results)
#     Cloudflare Pages: Read      (poll deploy status)
#
# Optional repo variables:
#   CLOUDFLARE_PAGES_PROJECT — Pages project name (default: syrabit-analytics)
#

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_lighthouse:
        description: "Skip Lighthouse threshold checks (emergency hotfix bypass)."
        required: false
        type: boolean
        default: false
      skip_pages_wait:
        description: "Skip waiting for Pages deploy (run against already-live version)."
        required: false
        type: boolean
        default: false

# Only one Lighthouse run at a time per branch — back-to-back pushes would
# otherwise create two concurrent Observatory tests for the same URL.
concurrency:
  group: post-deploy-lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse-check:
    name: Lighthouse post-deploy check (LCP / CLS / INP)
    # Only run on the production branches Pages watches.
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # 10 min for the Pages deploy poll (up to 20 min budget) + 10 min per page
    # for the Observatory test + headroom = 35 min ceiling.
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Verify Cloudflare token present
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN repo secret is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run post-deploy Lighthouse check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: "5b8c97df4431491dc7f60ea72fb61871"
          CLOUDFLARE_ACCOUNT_ID: "d66e40eac539fff1db270fddf384a5ec"
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'syrabit-analytics' }}
          # Pass the triggering commit SHA so the script correlates the Pages poll
          # to the specific deployment for this push rather than any recent success.
          # GITHUB_SHA is set by GitHub Actions for push/workflow_dispatch events.
          COMMIT_SHA: ${{ github.sha }}
          # Thresholds are hardcoded in the script (LCP 2500ms, CLS 0.1, INP 200ms).
          # Pass skip flags from workflow_dispatch inputs.  On push events both
          # inputs are absent and default to empty string → the script treats
          # any value other than "1" as false.
          SKIP_LIGHTHOUSE: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_lighthouse) && '1' || '0' }}
          SKIP_PAGES_WAIT: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_pages_wait) && '1' || '0' }}
          # Give the Pages deploy up to 20 min to land before timing out.
          PAGES_POLL_TIMEOUT_MS: "1200000"
          # Poll every 20 s while waiting for the Pages deploy.
          PAGES_POLL_INTERVAL_MS: "20000"
          # Give each Observatory test up to 10 min to return a result.
          LIGHTHOUSE_POLL_TIMEOUT_MS: "600000"
          # Poll Observatory every 15 s.
          LIGHTHOUSE_POLL_INTERVAL_MS: "15000"
          LIGHTHOUSE_REGION: "us-central1"
        run: node artifacts/syrabit/scripts/post-deploy-lighthouse.js
