name: admin-smoke

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #571 — Catch admin dashboard crashes early.
# Task #614 — Same gate now also runs the Phase-3 study-flows suite
# (highlight → save, quiz, flashcards, guardian-PIN). The job already
# invokes `pnpm run test:e2e` which runs every spec under
# artifacts/syrabit/tests; we just had to expand the path filters so a
# regression in those flows actually triggers the workflow.
# Task #772 — `payment-flow.spec.ts` (added by Task #767) is also
# auto-included by `pnpm run test:e2e`, but the path filter below
# previously didn't list any of the payment surfaces, so a payment-only
# change (admin_monetization route, ProfilePage, PaymentModal,
# SubscriptionPlans) shipped without exercising the spec. The payment
# paths added below close that gap.
#
# Task #567 was a runtime ReferenceError in a single admin widget that
# fell through the global ErrorBoundary and replaced the dashboard with
# the "Something went wrong" screen. This job runs the Playwright suite
# that mounts /admin against mocked admin APIs and asserts:
#
#   - the global ErrorBoundary heading is NOT shown
#   - data-testid="admin-dashboard" IS shown
#   - no uncaught ReferenceError / TypeError fired during render
#   - wiping a single metrics endpoint shows the inline "failed to load"
#     card and does not crash the shell.
#
# It also exercises the four Phase-3 study journeys against fully
# mocked /api/** routes (no LLM, no Postgres) via the dedicated
# /__test/study-harness page.
#
# Triggered on every PR that touches the admin component tree OR any
# of the source files the study-flows spec depends on, so the next
# missing-field / busted-popover bug fails CI before it lands.

on:
  push:
    branches: [master]
    paths:
      - "artifacts/syrabit/src/components/admin/**"
      - "artifacts/syrabit/src/components/study/**"
      - "artifacts/syrabit/src/components/ErrorBoundary.jsx"
      - "artifacts/syrabit/src/hooks/useStrictMode.jsx"
      - "artifacts/syrabit/src/pages/AdminPage.jsx"
      - "artifacts/syrabit/src/pages/AdminLoginPage.jsx"
      - "artifacts/syrabit/src/pages/ChapterPage.jsx"
      - "artifacts/syrabit/src/pages/FlashcardsPage.jsx"
      - "artifacts/syrabit/src/pages/GuardianPage.jsx"
      - "artifacts/syrabit/src/pages/NotebookPage.jsx"
      - "artifacts/syrabit/src/pages/StudyTestHarnessPage.jsx"
      - "artifacts/syrabit/src/utils/studyApi.js"
      - "artifacts/syrabit/src/App.jsx"
      # Task #772 — payment surfaces. Touch any of these → run the
      # payment-flow.spec.ts that ships with the e2e suite.
      - "artifacts/syrabit/src/pages/ProfilePage.jsx"
      - "artifacts/syrabit/src/pages/profile/**"
      - "artifacts/syrabit-backend/routes/admin_monetization.py"
      - "artifacts/syrabit-backend/tests/test_payments_*.py"
      - "artifacts/syrabit/tests/**"
      - "artifacts/syrabit/playwright.config.ts"
      - ".github/workflows/admin-smoke.yml"
  pull_request:
    branches: [master]
    paths:
      - "artifacts/syrabit/src/components/admin/**"
      - "artifacts/syrabit/src/components/study/**"
      - "artifacts/syrabit/src/components/ErrorBoundary.jsx"
      - "artifacts/syrabit/src/hooks/useStrictMode.jsx"
      - "artifacts/syrabit/src/pages/AdminPage.jsx"
      - "artifacts/syrabit/src/pages/AdminLoginPage.jsx"
      - "artifacts/syrabit/src/pages/ChapterPage.jsx"
      - "artifacts/syrabit/src/pages/FlashcardsPage.jsx"
      - "artifacts/syrabit/src/pages/GuardianPage.jsx"
      - "artifacts/syrabit/src/pages/NotebookPage.jsx"
      - "artifacts/syrabit/src/pages/StudyTestHarnessPage.jsx"
      - "artifacts/syrabit/src/utils/studyApi.js"
      - "artifacts/syrabit/src/App.jsx"
      # Task #772 — payment surfaces (mirrors push filter above).
      - "artifacts/syrabit/src/pages/ProfilePage.jsx"
      - "artifacts/syrabit/src/pages/profile/**"
      - "artifacts/syrabit-backend/routes/admin_monetization.py"
      - "artifacts/syrabit-backend/tests/test_payments_*.py"
      - "artifacts/syrabit/tests/**"
      - "artifacts/syrabit/playwright.config.ts"
      - ".github/workflows/admin-smoke.yml"

jobs:
  admin-smoke:
    name: Playwright /admin smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + system deps
        run: pnpm --filter @workspace/syrabit exec playwright install --with-deps chromium

      - name: Run admin dashboard smoke suite
        run: pnpm --filter @workspace/syrabit run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: admin-smoke-playwright-report
          path: |
            artifacts/syrabit/playwright-report/
            artifacts/syrabit/test-results/
          if-no-files-found: ignore
          retention-days: 7
