name: admin-smoke

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes (Task #905): every workflow declares an explicit
# top-level `permissions:` block granting only the `GITHUB_TOKEN` scopes its
# jobs actually need — read-only by default. Omitting `permissions:` falls
# back to the repo default (`contents: write`), which would defeat the
# SHA-pinning hardening if a pinned action were ever compromised.
#
# Task #571 — Catch admin dashboard crashes early.
# Task #614 — Same gate now also runs the Phase-3 study-flows suite.
# Task #772 — payment-flow.spec.ts also covered.
# Task #8   — This workflow was previously a path-filtered PR gate that
#             duplicated the Playwright run already enforced by all-tests.yml.
#             It has been converted to a nightly scheduled run so every PR
#             sees exactly one Playwright job (all-tests.yml) while still
#             running the admin/study/payment smoke suite off-hours to catch
#             environment-level regressions that aren't tied to a specific PR.
# Task #80  — Second job `cf-network-checks` runs check-http3-early-hints.sh
#             nightly so a silent Cloudflare configuration rollback (HTTP/3 or
#             Early Hints toggled off) is caught within 24 hours. Runs in
#             parallel with the Playwright job — needs no Node/pnpm setup
#             because curl is pre-installed on ubuntu-latest.
#
# Nightly smoke: 02:00 UTC every day.  Can also be triggered manually
# via workflow_dispatch for on-demand checks.
#

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:       # allow manual triggers from the GitHub UI

# Read-only token: this job checks out the repo, runs Playwright in headless
# Chromium, and uploads a run-scoped report artifact on failure.
permissions:
  contents: read

jobs:
  admin-smoke:
    name: Playwright /admin smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after the
          # checkout so a future upload-artifact step that accidentally
          # globs in .git/ cannot leak the token.
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + system deps
        run: pnpm --filter @workspace/syrabit exec playwright install --with-deps chromium

      - name: Run admin dashboard smoke suite
        run: pnpm --filter @workspace/syrabit run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: admin-smoke-playwright-report
          path: |
            artifacts/syrabit/playwright-report/
            artifacts/syrabit/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # Task #80 — HTTP/3 + Early Hints live check.
  # Runs in parallel with the Playwright job (no `needs:` dependency).
  # Only curl is required; ubuntu-latest pre-installs it.  If curl on the
  # runner is built without QUIC support (Ubuntu 22.04 default), the script
  # falls back to alt-svc header inspection for the HTTP/3 assertion and
  # still checks the Link: rel=preload header for the Early Hints assertion.
  # A non-zero exit from the script marks the job — and therefore the
  # workflow — as failed, which wires into the existing smoke-run alerting.
  cf-network-checks:
    name: HTTP/3 + Early Hints live check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: HTTP/3 + Early Hints check (syrabit.ai)
        run: bash artifacts/syrabit/scripts/check-http3-early-hints.sh

  # Task #105 — Phase 1: sort_query_string_for_cache, true_client_ip_header, ECH,
  #             sbfm_likely_automated, content_bots_protection, DMARC p= policy.
  # Task #106 — Phase 2: R2 bucket syrabit-logs, Logpush jobs (http_requests +
  #             firewall_events), Origin Healthcheck api-syrabit-ai-origin.
  # Task #107 — Phase 3: Zero Trust Access app (Syrabit Admin, 8h session) and
  #             Waiting Room (syrabit-exam-season-queue, 10-min cookie, enabled).
  # Task #108 — Phase 4: R2 bucket syrabit-assets (student PDF storage,
  #             assets.syrabit.ai), R2 bucket syrabit-cache-reserve, and
  #             Cache Reserve enabled on the syrabit.ai zone.
  # Task #109 — Phase 5: Analytics Engine dataset binding (syrabit-edge-metrics)
  #             present in the deployed syrabit-edge worker, and RateLimiter
  #             Durable Object namespace provisioned via [[migrations]] v1.
  # Task #110 — Phase 6: mTLS client certificate (syrabit-railway-mtls), CF
  #             Image Resizing (image_resizing=on), Zaraz GA4 tool enabled,
  #             Observatory weekly schedules for homepage + chapter page.
  #             Phase 2–6 checks degrade gracefully if the token lacks the
  #             required read scopes (warns, does not fail hard — see task-116,
  #             task-117, and follow-up tasks for Phase 4–6 token scopes).
  # Runs in parallel with the other smoke jobs (no `needs:` dependency).
  cf-zone-settings:
    name: Cloudflare Phase 1–6 nightly smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Verify Cloudflare Phase 1–6 settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: "5b8c97df4431491dc7f60ea72fb61871"
          CLOUDFLARE_ACCOUNT_ID: "d66e40eac539fff1db270fddf384a5ec"
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
          # Task #110 Phase 6: Railway origin bypass probe.
          # When set, nightly-smoke.js sends a direct unauthenticated request to
          # this URL and asserts the connection is rejected (Railway mTLS active).
          # Set via GitHub repo secrets: Settings → Secrets → RAILWAY_ORIGIN_URL
          RAILWAY_ORIGIN_URL: ${{ secrets.RAILWAY_ORIGIN_URL }}
        run: node artifacts/syrabit/scripts/nightly-smoke.js
