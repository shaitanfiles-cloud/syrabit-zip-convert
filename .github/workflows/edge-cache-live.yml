name: edge-cache-live

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes (Task #905): every workflow declares an explicit
# top-level `permissions:` block granting only the `GITHUB_TOKEN` scopes its
# jobs actually need — read-only by default. Omitting `permissions:` falls
# back to the repo default (`contents: write`), which would defeat the
# SHA-pinning hardening if a pinned action were ever compromised.
#
# Task #794 — Live HTTP integration test for the edge worker cache.
#
# Hits 8 cacheable routes on the deployed worker twice each and gates on
# `X-Cache: HIT` (or `HIT-304`) on the second response. Complements the
# in-memory classifier test in
# workers/edge-proxy/tests/edge-cache-classify.test.ts.
#
# Cadence: nightly cron + manual workflow_dispatch. Not run on PRs because
# we don't want a transient CF cache flake to block merges, and we don't
# want pre-existing production regressions (tracked in tasks #804 and
# #805) to wedge the master branch. When those follow-ups land we can
# graduate this to a merge-blocking job by adding it to the
# `pull_request` trigger and removing `continue-on-error`.

on:
  schedule:
    # 03:17 UTC daily — off the hour to dodge GitHub's cron stampede.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (default: https://api.syrabit.ai)"
        required: false
        default: "https://api.syrabit.ai"

# Read-only token: this job checks out the repo and probes the live
# api.syrabit.ai worker over HTTP. It does not write back to the repo,
# touch packages, or open PRs.
permissions:
  contents: read

jobs:
  probe:
    name: live edge cache probe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Non-blocking: surfaces regressions in the run summary but does not
    # gate other deploys. Flip to `false` once #804 and #805 are closed.
    continue-on-error: true

    env:
      # Default to api.syrabit.ai unless workflow_dispatch overrides it.
      EDGE_CACHE_TEST_URL: ${{ github.event.inputs.base_url || 'https://api.syrabit.ai' }}
      # Generous timeout/delay for cold POPs in CI.
      EDGE_CACHE_TIMEOUT_MS: "15000"
      EDGE_CACHE_DELAY_MS: "500"
      # CRITICAL: LENIENT mode must NEVER be set in CI — it lets D1 and
      # MISS/BYPASS slip through and defeats the regression gate. We set
      # it to the empty string explicitly so an env-leak from a parent
      # workflow can't enable it.
      EDGE_CACHE_LENIENT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. This job runs the edge-cache smoke probe; it does
          # not push back to the repo, so persisting credentials would
          # only widen the blast radius of an accidental .git/ artifact
          # upload.
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Guard against accidental LENIENT mode
        run: |
          if [ -n "$EDGE_CACHE_LENIENT" ]; then
            echo "::error::EDGE_CACHE_LENIENT must be empty in CI; refusing to run a non-gating cache check."
            exit 1
          fi

      - name: Run live edge cache check
        run: pnpm --filter @workspace/syrabit run test:edge-cache
