name: all-tests

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Least-privilege scopes: every job declares an explicit top-level
# `permissions:` block granting only the `GITHUB_TOKEN` scopes it actually
# needs — read-only by default.
#
# Wire-up CI gate for all 75 tests (Task #2).
#
# Runs the complete test suite — Vitest unit/component tests AND the full
# Playwright E2E suite — on every push and pull request to `master`, with no
# path filtering. A single red test blocks the merge.
#
# Why a separate workflow rather than extending frontend-tests.yml?
# - `frontend-tests.yml` intentionally stays lightweight (vitest + build only).
# - Playwright requires installing Chromium and a running dev server, which
#   adds ~4-6 min. Keeping them separate means a vitest-only PR doesn't pay
#   the Playwright overhead, while this gate still fires on every change.
# - Both workflows are listed as required checks in branch-protection so
#   neither can be skipped.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Read-only token: checks out the repo, runs tests, uploads a Playwright
# report artifact on failure. Does not write back to the repo.
permissions:
  contents: read

jobs:
  vitest:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run edge worker unit tests (vitest)
        run: pnpm --filter ./workers/edge-proxy run test --run

      - name: Run syrabit web unit tests (vitest)
        run: pnpm --filter @workspace/syrabit run test

  playwright:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + system deps
        run: pnpm --filter @workspace/syrabit exec playwright install --with-deps chromium

      - name: Run full Playwright E2E suite
        run: pnpm --filter @workspace/syrabit run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: all-tests-playwright-report
          path: |
            artifacts/syrabit/playwright-report/
            artifacts/syrabit/test-results/
          if-no-files-found: ignore
          retention-days: 7
