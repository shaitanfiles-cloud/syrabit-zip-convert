name: trustpilot-aggregate-refresh

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #749 — Auto-refresh the Trustpilot aggregate from a host that
# can actually reach Trustpilot.
#
# The Cloud Run / Railway backend container and the Cloudflare Pages
# build container are both WAF-blocked from api.trustpilot.com (Task
# #747 confirmed CloudFront 403s on every endpoint shape). GitHub-hosted
# runners are NOT blocked, so we run the refresh here once a day:
#
#   1. scripts/refresh-trustpilot-aggregate.mjs hits the Trustpilot
#      Business API for our business unit.
#   2. Updates artifacts/syrabit/scripts/.trustpilot-aggregate-cache.json
#      so the next Cloudflare Pages build bakes fresh values into the
#      AggregateRating JSON-LD on every page.
#   3. POSTs the values to https://api.syrabit.ai/api/config/trustpilot
#      /aggregate/refresh with the shared TRUSTPILOT_REFRESH_SECRET so
#      the backend's in-process cache is updated immediately and the
#      >24h staleness alert (get_trustpilot_aggregate_health) clears
#      without waiting for a redeploy.
#   4. If the cache file changed, commits it back to master via the
#      default GITHUB_TOKEN. The commit message is prefixed with
#      "[skip ci]" so we don't recursively trigger the Cloudflare Pages
#      build and other CI on every refresh — Pages picks up the new
#      cache on the next normal deploy.
#
# Required repo secrets:
#   TRUSTPILOT_API_KEY            Trustpilot Business API key
#   TRUSTPILOT_BUSINESS_UNIT_ID   Trustpilot business unit GUID
#   TRUSTPILOT_REFRESH_SECRET     Same value as the backend env var
#                                 (Cloud Run/Railway). When omitted,
#                                 only the cache file is updated.
#
# Optional repo variable:
#   TRUSTPILOT_BACKEND_URL        Override https://api.syrabit.ai
#                                 (e.g. for staging refreshes).

on:
  schedule:
    # 04:30 UTC daily — well before the 06:00 UTC trustpilot-jsonld-prod
    # verifier so a missed/failed refresh has 90 minutes to alert before
    # the verifier runs against potentially-stale numbers.
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      skip_commit:
        description: "Don't commit the cache file even if it changed"
        type: boolean
        default: false
      skip_backend_push:
        description: "Don't POST to the backend webhook"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh Trustpilot aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need write access for the auto-commit step below.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Refresh Trustpilot aggregate
        id: refresh
        # Don't fail the job here on a backend-push failure (exit 2):
        # we still want the commit step below to persist the freshly
        # written cache file so the next Cloudflare Pages build picks
        # up the new numbers, even when the backend webhook is
        # transiently down. We re-raise the failure at the end of the
        # job so on-call still gets notified.
        continue-on-error: true
        env:
          TRUSTPILOT_API_KEY: ${{ secrets.TRUSTPILOT_API_KEY }}
          TRUSTPILOT_BUSINESS_UNIT_ID: ${{ secrets.TRUSTPILOT_BUSINESS_UNIT_ID }}
          TRUSTPILOT_REFRESH_SECRET: ${{ secrets.TRUSTPILOT_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.TRUSTPILOT_BACKEND_URL || 'https://api.syrabit.ai' }}
          SKIP_BACKEND_PUSH: ${{ inputs.skip_backend_push && '1' || '' }}
        run: |
          set +e
          node scripts/refresh-trustpilot-aggregate.mjs
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Annotate distinct outcomes so ops can tell at a glance
          # which half failed.
          case "$rc" in
            0)
              echo "::notice title=Trustpilot refresh::full success" ;;
            2)
              echo "::warning title=Trustpilot refresh::partial — cache file written but backend push failed (will commit cache and fail job at end)" ;;
            *)
              echo "::error title=Trustpilot refresh::Trustpilot fetch failed (rc=$rc) — nothing to commit" ;;
          esac
          # Always exit 0 here; the final "fail-if-needed" step below
          # decides whether the job as a whole should be red.
          exit 0

      - name: Commit refreshed cache file
        # Skip the commit only when the operator opted out OR the
        # Trustpilot fetch itself failed (rc != 0 and != 2) — in that
        # case the cache file was not rewritten, so there is nothing
        # meaningful to commit. rc==2 means cache was written but the
        # backend push failed; we still want to commit.
        if: ${{ !inputs.skip_commit && (steps.refresh.outputs.rc == '0' || steps.refresh.outputs.rc == '2') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cache_file="artifacts/syrabit/scripts/.trustpilot-aggregate-cache.json"
          if git diff --quiet -- "$cache_file"; then
            echo "[trustpilot-refresh] cache file unchanged — nothing to commit"
            exit 0
          fi
          git config user.name  "syrabit-trustpilot-bot"
          git config user.email "trustpilot-bot@users.noreply.github.com"
          git add "$cache_file"
          git commit -m "chore(trustpilot): refresh aggregate cache [skip ci]"
          # Retry-once on push race with a concurrent merge to master.
          if ! git push; then
            echo "[trustpilot-refresh] push failed — rebasing and retrying once"
            git pull --rebase
            git push
          fi

      - name: Heartbeat to backend (Task #751)
        # Always run, even if earlier steps failed — the whole point of
        # this heartbeat is to distinguish "Trustpilot is down" (refresh
        # script failed but the workflow ran) from "the cron is silent"
        # (workflow didn't run at all). The backend's >36h silence
        # alerter only fires when no heartbeat arrives, so we MUST send
        # one even when rc != 0.
        if: always()
        env:
          TRUSTPILOT_REFRESH_SECRET: ${{ secrets.TRUSTPILOT_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.TRUSTPILOT_BACKEND_URL || 'https://api.syrabit.ai' }}
          RC: ${{ steps.refresh.outputs.rc }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/trustpilot-aggregate-refresh.yml
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          if [ -z "${TRUSTPILOT_REFRESH_SECRET:-}" ]; then
            echo "::warning title=Heartbeat::TRUSTPILOT_REFRESH_SECRET not set — skipping backend heartbeat"
            exit 0
          fi
          # Map refresh script rc → status string the backend records.
          # rc unset means the refresh step itself was skipped/cancelled
          # (still a real workflow run; report as failure so on-call can
          # tell from the dashboard pill).
          case "${RC:-}" in
            0)  STATUS="success" ;;
            2)  STATUS="partial" ;;
            "") STATUS="failure" ;;
            *)  STATUS="failure" ;;
          esac
          payload=$(printf '{"status":"%s","rc":%s,"runUrl":"%s","workflowUrl":"%s","runId":"%s"}' \
            "$STATUS" "${RC:-null}" "$RUN_URL" "$WORKFLOW_URL" "$RUN_ID")
          # Best-effort, but log the HTTP status so a heartbeat-side
          # outage is at least visible in the run log.
          http_code=$(curl -sS -o /tmp/hb_body -w '%{http_code}' \
            -X POST "${BACKEND_URL%/}/api/config/trustpilot/refresh-cron-heartbeat" \
            -H 'Content-Type: application/json' \
            -H "X-Trustpilot-Refresh-Secret: ${TRUSTPILOT_REFRESH_SECRET}" \
            --max-time 15 --retry 2 --retry-delay 5 \
            -d "$payload")
          echo "[heartbeat] http=$http_code body=$(cat /tmp/hb_body 2>/dev/null | head -c 300)"
          if [ "$http_code" != "200" ]; then
            echo "::warning title=Heartbeat::backend heartbeat returned $http_code (non-fatal)"
          fi
          exit 0

      - name: Fail job if refresh script reported an error
        if: ${{ steps.refresh.outputs.rc != '0' }}
        env:
          # Task #906 — pass the refresh step's rc through an env var
          # rather than direct ${{ ... }} interpolation into the shell.
          # The value is a numeric exit code we wrote ourselves, but
          # env-var indirection means a future change can never escape
          # into a different shell command (template-injection class).
          REFRESH_RC: ${{ steps.refresh.outputs.rc }}
        run: |
          echo "Trustpilot refresh script exited with rc=${REFRESH_RC}"
          exit 1
