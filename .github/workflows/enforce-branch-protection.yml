name: enforce-branch-protection

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
#
# Task #141 — Enforce the post-deploy Lighthouse check as a required status
# check on the master/main branch protection rule so a PR that introduces an
# LCP / CLS / INP regression cannot be merged until it is fixed.
#
# What it does:
#   Runs artifacts/syrabit/scripts/enforce-branch-protection.js which:
#   1. Iterates over BRANCHES (default: "master,main"), skipping any that
#      don't exist in this repository.
#   2. For each branch: GETs the current protection rule (tolerates 404/new).
#   3. Idempotently adds the Lighthouse context to required_status_checks,
#      preserving ALL existing settings (including required_linear_history,
#      allow_force_pushes, allow_deletions, required_conversation_resolution,
#      lock_branch, etc.) in the PUT payload.
#   Exiting 0 on an already-configured branch is a no-op.
#
# Required repo secret (Settings → Secrets → Actions → Secrets):
#   BRANCH_PROTECTION_TOKEN — a Personal Access Token (PAT) with the `repo`
#                             scope whose owner is a repository admin.
#                             The built-in Actions GITHUB_TOKEN cannot write
#                             branch protection rules — a named PAT is required.
#                             Do NOT reuse secrets.GITHUB_TOKEN here.
#
# Required status check context applied:
#   "post-deploy-lighthouse / Lighthouse post-deploy check (LCP / CLS / INP)"
#
# Trigger: workflow_dispatch (one-shot admin tool) + weekly cron (guard).
# The weekly run catches any accidental removal of the protection rule.
#

on:
  workflow_dispatch:
    inputs:
      branches:
        description: "Comma-separated list of branches to update (default: master,main)"
        required: false
        default: "master,main"
        type: string
      dry_run:
        description: "Print the PUT payload without sending it (smoke-test mode)."
        required: false
        type: boolean
        default: false

  schedule:
    # Re-apply weekly (Mondays at 06:00 UTC) so an accidental removal is
    # detected and repaired within a week.
    - cron: "0 6 * * 1"

# Serialise protection-edit runs to avoid race conditions on the API.
concurrency:
  group: enforce-branch-protection
  cancel-in-progress: false

# Least-privilege: no repository contents write access needed.
# Branch-protection API calls use the BRANCH_PROTECTION_TOKEN PAT secret.
permissions:
  contents: read

jobs:
  enforce:
    name: Add Lighthouse check to required status checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Enforce branch protection
        env:
          # BRANCH_PROTECTION_TOKEN must be a PAT with `repo` scope stored by a
          # repo admin.  It is NOT the same as the automatic ${{ secrets.GITHUB_TOKEN }}
          # Actions token — that token cannot write branch protection rules.
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # workflow_dispatch: use the user-supplied branch list.
          # schedule: update both master and main (one or both may not exist;
          # the script skips branches that are absent).
          BRANCHES: ${{ inputs.branches || 'master,main' }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: node artifacts/syrabit/scripts/enforce-branch-protection.js
