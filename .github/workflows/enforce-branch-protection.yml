name: enforce-branch-protection

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
#
# Task #141 — Enforce the post-deploy Lighthouse check as a required status
# check on the master/main branch protection rule so a PR that introduces an
# LCP / CLS / INP regression cannot be merged until it is fixed.
#
# Trigger: workflow_dispatch (one-shot admin tool) plus a weekly schedule to
# re-apply the rule in case it is ever accidentally removed.
#
# What it does:
#   Runs artifacts/syrabit/scripts/enforce-branch-protection.js which:
#   1. GETs the current branch protection rule for master.
#   2. Checks whether the Lighthouse context is already present.
#   3. If absent: PUTs the updated rule with the context added, preserving
#      every existing setting (enforce_admins, required_pull_request_reviews,
#      restrictions, strict).
#   The script is idempotent — running it when the check is already configured
#   is a no-op (exits 0 without making any API write).
#
# Required repo secret (Settings → Secrets and variables → Actions → Secrets):
#   GITHUB_TOKEN — a Personal Access Token (not the standard Actions token)
#                  with the `repo` scope.  The PAT owner must be a repository
#                  admin.  The default Actions GITHUB_TOKEN does not include
#                  the `admin:repo` permission needed to write branch protection.
#
# Optional repo variable:
#   ENFORCE_PROTECTION_BRANCH — branch to target (default: master)
#
# Required status check context applied:
#   "post-deploy-lighthouse / Lighthouse post-deploy check (LCP / CLS / INP)"
#

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update (default: master)"
        required: false
        default: "master"
        type: string
      dry_run:
        description: "Print the payload without sending it (smoke-test mode)."
        required: false
        type: boolean
        default: false

  schedule:
    # Re-apply weekly (Mondays at 06:00 UTC) so an accidental removal is
    # caught within a week rather than silently leaving PRs unprotected.
    - cron: "0 6 * * 1"

# No concurrent protection-edit runs — serialise to avoid race conditions on
# the GitHub branch-protection API.
concurrency:
  group: enforce-branch-protection
  cancel-in-progress: false

# Least-privilege: this workflow needs no repository contents write access.
# Branch-protection API calls are authenticated via the GITHUB_TOKEN PAT secret.
permissions:
  contents: read

jobs:
  enforce:
    name: Add Lighthouse check to required status checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Enforce branch protection
        env:
          # Use the GITHUB_TOKEN *secret* (a PAT stored by a repo admin) — not
          # the automatic ${{ secrets.GITHUB_TOKEN }} Actions token, which lacks
          # admin permission for branch protection writes.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # workflow_dispatch: use the user-supplied branch input.
          # schedule: fall back to the repo variable or "master".
          BRANCH: ${{ inputs.branch || vars.ENFORCE_PROTECTION_BRANCH || 'master' }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: node artifacts/syrabit/scripts/enforce-branch-protection.js
