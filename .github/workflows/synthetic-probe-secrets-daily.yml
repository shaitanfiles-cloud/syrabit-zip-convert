name: synthetic-probe-secrets-daily

#
# Supply-chain hardening: every `uses:` reference in this file is pinned to a
# full 40-char commit SHA (with a trailing `# vX.Y.Z` tag comment for
# readability). Float tags like `actions/checkout@v4` are forbidden because a
# compromise of the upstream tag — as happened with tj-actions/changed-files in
# 2025 — would let an attacker silently exfiltrate this repo's secrets on the
# next push. See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# To upgrade an action: look up the SHA for the new tag (e.g.
# `gh api repos/actions/checkout/git/refs/tags/v4.3.0 --jq .object.sha`) and
# update both the SHA and the trailing tag comment.
#
# Task #899 — Daily check that the prod-down alert webhook (and the three other
# secrets the synthetic probe relies on) are still configured on the live
# `syrabit-edge` worker.
#
# Why
# ---
# Task #886 set `SYNTHETIC_PROBE_WATCHDOG_WEBHOOK_URL` as a Wrangler secret on
# `syrabit-edge`. That secret is what makes the per-minute synthetic probe
# (Task #708) actually wake a human if production goes dark. Nothing today
# prevents that secret — or the three other secrets the probe relies on
# (`SYNTHETIC_PROBE_CF_ACCESS_CLIENT_ID`,
# `SYNTHETIC_PROBE_CF_ACCESS_CLIENT_SECRET`, `SYNTHETIC_PROBE_ADMIN_JWT`) —
# from being silently removed during an unrelated Wrangler env reshuffle, an
# accidental `wrangler secret delete`, or a misapplied env-promotion script.
# If any of them disappears, the next outage looks identical to "everything is
# healthy" again — exactly the failure mode Task #877 was triggered by.
#
# The runbook (`docs/CLOUDFLARE_ZERO_TRUST.md` §7.1) tells the operator to
# re-fire `pnpm run test-fire:watchdog` quarterly, but that only catches drift
# at most every ~90 days and depends on a human remembering. This workflow
# catches it within 24h with no human in the loop.
#
# What this runs
# --------------
# 1. `npx wrangler@4 secret list --name syrabit-edge` (run with the same
#    `CLOUDFLARE_API_TOKEN` / `CLOUDFLARE_ACCOUNT_ID` that
#    `edge-proxy-deploy.yml` uses) — returns a JSON array of
#    `{ "name": "...", "type": "secret_text" }` entries for every secret
#    bound to the live worker.
# 2. Verifies all four entries in `REQUIRED_SECRETS` are present.
# 3. If any are missing, POSTs the list to the backend at
#    `/api/config/synthetic-probe-secrets/missing-alert`, which re-dispatches
#    through the existing `metrics._dispatch_alert` pipeline (email +
#    webhook + persisted + push) with `alert_type="synthetic_probe_secret_missing"`.
# 4. Fails the workflow itself so GitHub's built-in failed-workflow email
#    serves as a secondary signal in case the backend POST itself failed.
#
# A successful run (all four secrets present) is silent — no Slack post, no
# email, no backend ping.
#
# Required repo secrets
# ---------------------
#   CLOUDFLARE_API_TOKEN       Cloudflare API token with
#                              `Workers Scripts:Edit` (sufficient to call
#                              `wrangler secret list` against the worker).
#                              Already set for the edge-proxy-deploy workflow.
#   CLOUDFLARE_ACCOUNT_ID      The account ID Wrangler should target. Already
#                              set for the edge-proxy-deploy workflow.
#   SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN
#                              Shared secret authenticating the workflow's
#                              POST to the backend. Same value as the
#                              `SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN` env var
#                              on the FastAPI service. Set both in tandem
#                              (otherwise the backend returns 503 and the
#                              workflow fails — visible by design).
#
# Optional repo variable
# ----------------------
#   SYNTHETIC_PROBE_BACKEND_URL  Override https://api.syrabit.ai for the
#                                alert POST (e.g. staging refreshes). Same
#                                shape as CF_WAF_DRIFT_BACKEND_URL.
#
# Setup is documented in docs/CLOUDFLARE_ZERO_TRUST.md §7.1.

on:
  schedule:
    # 05:13 UTC daily — offset off cf-waf-drift-daily (04:47), grounded-recall
    # (04:30), trustpilot-aggregate-refresh (04:30 / Mondays), and edge-cache-live
    # (03:17) so a Slack burst from one workflow doesn't bury this one, and so
    # we dodge GitHub's top-of-hour cron stampede.
    - cron: "13 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-secrets:
    name: Verify synthetic-probe Wrangler secrets present
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: syrabit-edge

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Task #906 — strip the GITHUB_TOKEN from .git/config after
          # checkout. This job calls the Cloudflare API and the backend
          # via their own secrets; it does not push back to the repo, so
          # persisting credentials would only widen the blast radius.
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Guard required secrets
        # Fail fast with a clear message if the cron rolled out before the
        # operator added the secrets, instead of an opaque "401 Unauthorized"
        # from Cloudflare 30 lines deeper.
        run: |
          set -e
          missing=""
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            missing="$missing CLOUDFLARE_API_TOKEN"
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            missing="$missing CLOUDFLARE_ACCOUNT_ID"
          fi
          if [ -n "$missing" ]; then
            echo "::error title=Missing secrets::Required repo secrets not configured:$missing"
            echo "Add them in Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: List secrets on live syrabit-edge worker
        id: list
        # `wrangler secret list --name <worker>` writes the JSON array to
        # stdout and prints the standard wrangler banner ("⛅️ wrangler 4.x.x")
        # to stderr. We redirect stderr to /dev/null but we ALSO defensively
        # extract the first `[ ... ]` block via jq's input parser, in case a
        # future wrangler version starts mixing banner lines into stdout.
        # Captures both rc and the captured JSON for the next step.
        run: |
          set +e
          cd workers/edge-proxy
          raw=$(npx --yes wrangler@4 secret list --name "$WORKER_NAME" 2>/tmp/wrangler-stderr.log)
          rc=$?
          echo "rc=$rc"
          if [ "$rc" != "0" ]; then
            echo "::error title=wrangler secret list failed::rc=$rc"
            echo "--- wrangler stderr (last 2000 chars) ---"
            tail -c 2000 /tmp/wrangler-stderr.log || true
            echo "------------------------------------------"
            echo "rc=$rc" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # If raw isn't valid JSON, try to extract the first array literal.
          if ! echo "$raw" | jq -e 'type=="array"' >/dev/null 2>&1; then
            cleaned=$(echo "$raw" | sed -n '/^\[/,/^\]/p')
            if echo "$cleaned" | jq -e 'type=="array"' >/dev/null 2>&1; then
              raw="$cleaned"
            else
              echo "::error title=wrangler secret list parse failed::stdout was not a JSON array"
              echo "--- raw stdout (last 2000 chars) ---"
              echo "$raw" | tail -c 2000
              echo "------------------------------------"
              echo "rc=99" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          # Persist to a file rather than $GITHUB_OUTPUT so multi-line JSON
          # round-trips cleanly through later steps.
          echo "$raw" > /tmp/wrangler-secrets.json
          echo "secret_count=$(echo "$raw" | jq 'length')"
          echo "rc=0" >> "$GITHUB_OUTPUT"

      - name: Compute missing required secrets
        id: diff
        # Source-of-truth list of secrets the synthetic probe + watchdog
        # need to function. Kept in sync with `_REQUIRED_SECRETS` in
        # `artifacts/syrabit-backend/routes/synthetic_probe_secret_alert.py`
        # and the table in `docs/CLOUDFLARE_ZERO_TRUST.md` §7.1.
        env:
          REQUIRED_SECRETS: |
            SYNTHETIC_PROBE_WATCHDOG_WEBHOOK_URL
            SYNTHETIC_PROBE_CF_ACCESS_CLIENT_ID
            SYNTHETIC_PROBE_CF_ACCESS_CLIENT_SECRET
            SYNTHETIC_PROBE_ADMIN_JWT
          # Task #906 — pass the previous step's rc through an env var
          # rather than direct ${{ ... }} interpolation into the shell.
          # The value is a numeric exit code we wrote ourselves, but
          # env-var indirection means a future change can never escape
          # into a different shell command (template-injection class).
          LIST_RC: ${{ steps.list.outputs.rc }}
        run: |
          set +e
          if [ "$LIST_RC" != "0" ]; then
            echo "::error title=skip diff::wrangler secret list failed in the previous step (rc=${LIST_RC}); cannot compute drift"
            echo "missing_count=-1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -s /tmp/wrangler-secrets.json ]; then
            echo "::error title=skip diff::no captured wrangler-secrets.json"
            echo "missing_count=-1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          required_json=$(printf '%s\n' $REQUIRED_SECRETS | jq -R . | jq -s .)
          missing_json=$(jq --argjson req "$required_json" '
            (map(.name)) as $present
            | $req
            | map(select(. as $r | ($present | index($r)) | not))
          ' /tmp/wrangler-secrets.json)
          missing_count=$(echo "$missing_json" | jq 'length')
          checked_json="$required_json"
          echo "checked: $(echo "$checked_json" | jq -c .)"
          echo "missing: $(echo "$missing_json" | jq -c .)"
          echo "missing_count: $missing_count"
          # Persist for the next step.
          echo "$missing_json" > /tmp/missing-secrets.json
          echo "$checked_json" > /tmp/checked-secrets.json
          echo "missing_count=$missing_count" >> "$GITHUB_OUTPUT"
          if [ "$missing_count" -gt "0" ]; then
            echo "::error title=Synthetic-probe secrets MISSING::$missing_count required Wrangler secret(s) absent from $WORKER_NAME — see next step for the alert dispatch"
          else
            echo "::notice title=Synthetic-probe secrets OK::all $(echo "$checked_json" | jq 'length') required secrets present on $WORKER_NAME"
          fi

      - name: Dispatch alert to backend on drift
        if: ${{ steps.diff.outputs.missing_count != '0' && steps.diff.outputs.missing_count != '-1' }}
        env:
          BACKEND_URL: ${{ vars.SYNTHETIC_PROBE_BACKEND_URL || 'https://api.syrabit.ai' }}
          SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN: ${{ secrets.SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/synthetic-probe-secrets-daily.yml
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          if [ -z "${SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN:-}" ]; then
            echo "::warning title=Backend alert skipped::SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN not configured. Job will still fail in the final step so the GitHub failed-workflow email goes out, but configure the secret to surface this through the metrics._dispatch_alert pipeline (email + webhook + persisted + push)."
            exit 0
          fi
          missing_json=$(cat /tmp/missing-secrets.json)
          checked_json=$(cat /tmp/checked-secrets.json)
          payload=$(jq -n \
            --argjson m "$missing_json" \
            --argjson c "$checked_json" \
            --arg run "$RUN_URL" \
            --arg wf  "$WORKFLOW_URL" \
            --arg id  "$RUN_ID" \
            '{missing:$m, checked:$c, runUrl:$run, workflowUrl:$wf, runId:$id}')
          http_code=$(curl -sS -o /tmp/alert_body -w '%{http_code}' \
            -X POST "${BACKEND_URL%/}/api/config/synthetic-probe-secrets/missing-alert" \
            -H 'Content-Type: application/json' \
            -H "X-Synthetic-Probe-Secrets-Check-Token: ${SYNTHETIC_PROBE_SECRETS_CHECK_TOKEN}" \
            --max-time 15 --retry 2 --retry-delay 5 \
            -d "$payload")
          echo "[alert] http=$http_code body=$(cat /tmp/alert_body 2>/dev/null | head -c 300)"
          if [ "$http_code" != "200" ]; then
            echo "::warning title=Backend alert failed::POST /api/config/synthetic-probe-secrets/missing-alert returned HTTP $http_code (job will still fail at the final step so the GitHub failed-workflow email goes out)"
          fi
          exit 0

      - name: Fail job on drift or list error
        if: ${{ steps.diff.outputs.missing_count != '0' }}
        env:
          # Task #906 — pass the diff step's count through an env var
          # rather than direct ${{ ... }} interpolation into the shell.
          # The value is a number we wrote ourselves, but env-var
          # indirection means a future change can never escape into a
          # different shell command (template-injection class).
          MISSING_COUNT: ${{ steps.diff.outputs.missing_count }}
        run: |
          echo "missing_count=${MISSING_COUNT} (expected 0)"
          if [ "$MISSING_COUNT" = "-1" ]; then
            echo "wrangler secret list itself failed — re-run after triaging Cloudflare auth."
          fi
          exit 1
