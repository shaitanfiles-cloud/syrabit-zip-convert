version: 2

# Task #883 — Companion to the SHA-pinning hardening across .github/workflows/*.
#
# Pinning every `uses:` reference to a 40-char commit SHA fixes the float-tag
# attack surface (e.g. tj-actions/changed-files 2025), but it also freezes the
# action at one revision. Dependabot watches the upstream repos for new tagged
# releases and opens PRs that bump both the SHA and the trailing `# vX.Y.Z`
# comment, so we stay current without re-introducing the float-tag risk.
#
# Reviewers: confirm the proposed SHA actually belongs to the action's release
# tag (Dependabot already does this, but spot-check is cheap) before merging.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
      - security
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
