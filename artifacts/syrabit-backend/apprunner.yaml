version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --no-cache-dir -r requirements.txt
run:
  command: gunicorn server:app -c gunicorn.conf.py
  network:
    port: 8000
  env:
    - name: PORT
      value: "8000"
    - name: MONGO_URL
      value: ""
    - name: DB_NAME
      value: "syrabit_prod"
    - name: JWT_SECRET
      value: ""
    - name: ADMIN_JWT_SECRET
      value: ""
    - name: LLM_PROVIDER
      value: "sarvam"
    - name: LLM_MODEL
      value: "sarvam-m"
    - name: SARVAM_API_KEY
      value: ""
    - name: OPENAI_API_KEY
      value: ""
    - name: GROQ_API_KEY
      value: ""
    - name: GEMINI_API_KEY
      value: ""
    - name: FIREWORKS_API_KEY
      value: ""
    - name: XAI_API_KEY
      value: ""
    - name: AWS_ACCESS_KEY_ID
      value: ""
    - name: AWS_SECRET_ACCESS_KEY
      value: ""
    - name: AWS_REGION
      value: "us-east-1"
    - name: UPSTASH_REDIS_REST_URL
      value: ""
    - name: UPSTASH_REDIS_REST_TOKEN
      value: ""
    - name: REDIS_URL
      value: ""
    - name: RESEND_API_KEY
      value: ""
    - name: EMAIL_FROM
      value: "noreply@syrabit.ai"
    - name: SUPABASE_URL
      value: ""
    - name: SUPABASE_SERVICE_KEY
      value: ""
    - name: SUPABASE_ANON_KEY
      value: ""
    - name: DATABASE_URL
      value: ""
    - name: RAZORPAY_KEY_ID
      value: ""
    - name: RAZORPAY_KEY_SECRET
      value: ""
    - name: ADMIN_EMAILS
      value: ""
    - name: ADMIN_PASSWORDS
      value: ""
    - name: ADMIN_NAMES
      value: ""
    - name: FRONTEND_URL
      value: "https://syrabit.ai"
    - name: CORS_ORIGINS
      value: "https://syrabit.ai,https://www.syrabit.ai"
    - name: APPRUNNER_SERVICE_URL
      value: ""
    - name: GUNICORN_WORKERS
      value: ""
    - name: GUNICORN_THREADS
      value: "2"
    - name: LOG_LEVEL
      value: "warning"
    - name: LLM_MAX_CONCURRENT
      value: "20"
    - name: LLM_BATCH_WINDOW_MS
      value: "15"
    - name: SECURE_COOKIES
      value: "true"
    - name: COOKIE_DOMAIN
      value: ".syrabit.ai"
# Health check configuration is not supported in apprunner.yaml.
# Configure via App Runner console or AWS CLI:
#   Path: /api/health
#   Protocol: HTTP
#   Interval: 10 seconds
#   Timeout: 5 seconds
#   Healthy threshold: 1
#   Unhealthy threshold: 3
