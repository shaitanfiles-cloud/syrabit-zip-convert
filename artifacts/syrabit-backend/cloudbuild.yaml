# Task #606 — Cloud Build pipeline: build the backend container, push to
# Artifact Registry, and roll out a new Cloud Run revision.
#
# Required substitutions (set per-trigger or via --substitutions on the CLI):
#   _REGION              GCP region (e.g. asia-south1)
#   _AR_REPO             Artifact Registry repo name (e.g. syrabit)
#   _SERVICE             Cloud Run service name (e.g. syrabit-backend)
#   _IMAGE               Image name within the AR repo (e.g. backend)
#   _RUNTIME_SA          Cloud Run runtime service account email
#   _MIN_INSTANCES       Min instances (e.g. 1 to avoid cold starts)
#   _MAX_INSTANCES       Max instances (e.g. 10)
#   _CONCURRENCY         Per-instance concurrency (e.g. 80)
#   _CPU                 vCPU per instance (e.g. 2)
#   _MEMORY              Memory per instance (e.g. 2Gi)
#   _SECRETS             Comma-separated KEY=SECRET_NAME:VERSION pairs (e.g.
#                        MONGO_URL=mongo-url:latest,JWT_SECRET=jwt-secret:latest)
#
# Manual invocation:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=asia-south1,_AR_REPO=syrabit,_SERVICE=syrabit-backend,\
# _IMAGE=backend,_RUNTIME_SA=syrabit-backend@PROJECT.iam.gserviceaccount.com,\
# _MIN_INSTANCES=1,_MAX_INSTANCES=10,_CONCURRENCY=80,_CPU=2,_MEMORY=2Gi,\
# _SECRETS=MONGO_URL=mongo-url:latest,JWT_SECRET=jwt-secret:latest,...
#
# See CLOUDRUN-DEPLOY.md for the full secret list.

substitutions:
  _REGION: asia-south1
  _AR_REPO: syrabit
  _SERVICE: syrabit-backend
  _IMAGE: backend
  _MIN_INSTANCES: "1"
  _MAX_INSTANCES: "10"
  _CONCURRENCY: "80"
  _CPU: "2"
  _MEMORY: 2Gi
  _RUNTIME_SA: ""
  _SECRETS: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest"

steps:
  # Pull the previous :latest into the local daemon so --cache-from below
  # can re-use Docker layers. `|| true` keeps the build green on the very
  # first run when no :latest tag exists yet.
  - id: warm-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest || true

  - id: build
    name: gcr.io/cloud-builders/docker
    # The backend Dockerfile lives under artifacts/syrabit-backend/. We point
    # the build context AND the -f flag at that folder so cloudbuild.yaml works
    # whether the trigger uses repo-root or backend-folder as the working dir.
    args:
      - build
      - --file=artifacts/syrabit-backend/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest
      - artifacts/syrabit-backend

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        EXTRA=()
        if [ -n "${_RUNTIME_SA}" ]; then
          EXTRA+=( --service-account="${_RUNTIME_SA}" )
        fi
        if [ -n "${_SECRETS}" ]; then
          EXTRA+=( --update-secrets="${_SECRETS}" )
        fi
        gcloud run deploy "${_SERVICE}" \
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:${SHORT_SHA}" \
          --region="${_REGION}" \
          --platform=managed \
          --port=8080 \
          --min-instances="${_MIN_INSTANCES}" \
          --max-instances="${_MAX_INSTANCES}" \
          --concurrency="${_CONCURRENCY}" \
          --cpu="${_CPU}" \
          --memory="${_MEMORY}" \
          --timeout=300 \
          --cpu-boost \
          --execution-environment=gen2 \
          --allow-unauthenticated \
          --ingress=all \
          --set-env-vars=PORT=8080,LOG_LEVEL=warning,GUNICORN_WORKERS=2 \
          "${EXTRA[@]}"
