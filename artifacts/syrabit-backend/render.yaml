services:
  - type: web
    name: syrabit-api
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -c gunicorn.conf.py
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_PASSWORDS
        sync: false
      - key: ADMIN_NAMES
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FIREWORKS_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_API_KEY_2
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: EMERGENT_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PG_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: CF_ANALYTICS_API_TOKEN
        sync: false
      - key: CF_ZONE_ID
        sync: false
      - key: CF_AI_GATEWAY_ACCOUNT_ID
        sync: false
      - key: CF_AI_GATEWAY_ID
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: CORS_ORIGINS
        value: "https://syrabit.ai,https://www.syrabit.ai"
      - key: PRODUCTION_ORIGINS
        value: "https://syrabit.ai,https://www.syrabit.ai"
      - key: FRONTEND_URL
        value: "https://syrabit.ai"
      - key: SECURE_COOKIES
        value: "true"
      - key: COOKIE_DOMAIN
        value: ""
