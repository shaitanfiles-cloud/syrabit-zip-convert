version: "3.9"

services:
  web:
    image: syrabit-backend:latest
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8000}
      - WORKERS=${WORKERS:-2}
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$${PORT:-8000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
