[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Files outside these globs do NOT trigger a redeploy. Keep this list in
# sync with everything the FastAPI image actually depends on. The
# dashboard "Watch Paths" must mirror these (or be left empty so Railway
# falls back to this list).
watchPatterns = [
    "artifacts/syrabit-backend/**",
    "artifacts/syrabit-backend/Dockerfile",
    "artifacts/syrabit-backend/requirements.txt",
]

[deploy]
startCommand = "gunicorn server:app -c gunicorn.conf.py"
preDeployCommand = "python scripts/verify_vectorize_token.py --predeploy"
# Task #848 — point Railway's restart probe at /api/livez (no I/O,
# <50 ms) instead of /api/health (full dep check). The full dep check
# moved to /api/readyz, which is for *load-balancer* readiness — not
# for "kill the container and respawn" decisions. A slow Mongo or
# Vertex outage was previously enough to convince Railway the pod
# was dead and restart it, which made things worse.
healthcheckPath = "/api/livez"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
