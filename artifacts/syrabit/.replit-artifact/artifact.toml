kind = "web"
previewPath = "/"
title = "Syrabit.ai"
version = "1.0.0"
id = "artifacts/syrabit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25144

[services.development]
run = "pnpm --filter @workspace/syrabit run dev"

[services.production]
build = [ "sh", "-c", "mkdir -p $HOME/.local/bin && corepack enable --install-directory=$HOME/.local/bin && export PATH=$HOME/.local/bin:$PATH && pnpm --filter @workspace/syrabit run build" ]
publicDir = "artifacts/syrabit/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25144"
BASE_PATH = "/"

[[services]]
name = "api"
paths = [ "/api" ]
localPort = 8000

[services.development]
run = "cd /home/runner/workspace/artifacts/syrabit-backend && gunicorn server:app -c gunicorn.conf.py"

[services.production]
build = [ "sh", "-c", "PIP_USER=0 pip3 install --no-cache-dir --target=/home/runner/workspace/.python-deps -r /home/runner/workspace/artifacts/syrabit-backend/requirements.txt" ]
run = [ "sh", "-c", "cd /home/runner/workspace/artifacts/syrabit-backend && PYTHONPATH=/home/runner/workspace/.python-deps gunicorn server:app -c gunicorn.conf.py" ]

[services.env]
PORT = "8000"
