      (function(){
        function runCacheCleanup(){
          var V='10';
          var keep=new Set(['syrabit-static-v'+V,'syrabit-runtime-v'+V,'syrabit-api-v'+V]);
          if('caches' in window){
            caches.keys().then(function(names){
              names.forEach(function(name){
                if(!keep.has(name)) caches.delete(name);
              });
            });
          }
          if('serviceWorker' in navigator){
            navigator.serviceWorker.getRegistrations().then(function(regs){
              regs.forEach(function(r){ r.update(); });
            });
          }
        }
        function schedule(){
          if('requestIdleCallback' in window){
            requestIdleCallback(runCacheCleanup,{timeout:4000});
          } else {
            setTimeout(runCacheCleanup,2000);
          }
        }
        if(document.readyState==='complete'){ schedule(); }
        else { window.addEventListener('load', schedule, {once:true}); }
      })();
    </script>

        (function deferThirdParty(){
          // Task #391: gate ALL third-party loaders strictly behind LCP.
          // No interaction-triggered load path — early scrolls/taps must
          // not race ahead of the largest-contentful-paint entry, since
          // those would still compete for bandwidth/main-thread during
          // the critical render window. Triggers, in order:
          //   1. PerformanceObserver fires on the largest-contentful-paint entry
          //   2. Hard 4 s fallback for headless tools / no-LCP cases
          var loaded=false,po=null,timer=null;
          function load(){
            if(loaded)return;loaded=true;
            window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);
            var em=document.createElement("script");em.src="https://assets.emergent.sh/scripts/emergent-main.js";em.async=true;document.body.appendChild(em);
            // AdSense loader is now in <head> (Task #401). Auto Ads are
            // enabled per-route from <AdAutoEnabler/> (mounted in App.jsx)
            // so anonymous SEO routes get Auto Ads while auth/payment/
            // admin/profile routes don't.
            if(po){try{po.disconnect()}catch(e){}}
            if(timer){clearTimeout(timer);timer=null;}
          }
          if('PerformanceObserver' in window){
            try{
              po=new PerformanceObserver(function(list){
                if(list.getEntries().length){ setTimeout(load,250); }
              });
              po.observe({type:'largest-contentful-paint',buffered:true});
            }catch(e){}
          }
          // Hard fallback for headless / no-LCP cases.
          timer=setTimeout(load,4000);
        })();
      </script>
