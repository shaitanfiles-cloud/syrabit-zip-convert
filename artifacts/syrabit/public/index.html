    <!-- Emergent badge — ULTRA MINIMIZED: transparent, invisible, non-clickable -->
    <style>
      /* NUCLEAR CSS — Maximum hiding with all possible properties */
      #emergent-badge,

        /* Spacing: zero */
        padding: 0 !important;

        /* Appearance: transparent */
        background: transparent !important;
        background-color: transparent !important;
        background-image: none !important;
        border: 0 !important;

        /* Text: invisible */

        /* Interaction: disabled */

        /* Content: removed */
        content: '' !important;
        content-visibility: hidden !important;
        
        /* Filter: invisible */
        filter: opacity(0) !important;
        backdrop-filter: none !important;
      }
      
      /* Hide all children and pseudo-elements */
      #emergent-badge *,
      #emergent-badge::before,
      #emergent-badge::after,
      a[href*="emergent.sh"] *,
      a[href*="emergent.sh"]::before,
      a[href*="emergent.sh"]::after,

    <script>
    (function() {
      'use strict';
      
      // Ultimate badge obliteration script
      var NUCLEAR_HIDE = [
        'display:none!important',
        'visibility:hidden!important',
        'opacity:0!important',
        'width:0!important',
        'height:0!important',
        'max-width:0!important',
        'max-height:0!important',
        'min-width:0!important',
        'min-height:0!important',
        'overflow:hidden!important',
        'clip:rect(0,0,0,0)!important',
        'clip-path:inset(50%)!important',
        'transform:scale(0)translateX(-9999px)translateY(-9999px)!important',
        'border:0!important',
        'padding:0!important',
        'margin:0!important',
        'background:transparent!important',
        'box-shadow:none!important',
        'position:fixed!important',
        'top:-9999px!important',
        'left:-9999px!important',
        'z-index:-99999!important',
        'pointer-events:none!important',
        'user-select:none!important',
        'cursor:default!important',
        'color:transparent!important',
        'font-size:0!important',
        'line-height:0!important',
        'filter:opacity(0)!important'
      ].join(';');

      function obliterateBadge() {
        // All possible selectors
        var selectors = [
          '#emergent-badge',
          'a[href*="emergent.sh"]',
          'a[href*="emergent-badge"]',
          'a[href*="emergent"]',
          '[id*="emergent-badge"]',
          '[id*="emergent"]',
          '[class*="emergent-badge"]',
          '[class*="emergent"]'
        ];
        
        selectors.forEach(function(selector) {
          try {
            document.querySelectorAll(selector).forEach(function(el) {
              // Apply nuclear styles
              el.style.cssText = NUCLEAR_HIDE;
              
              // Remove from DOM entirely
              if (el.parentNode) {
                el.parentNode.removeChild(el);
              }
              
              // Also nuke all children before removal
              el.querySelectorAll('*').forEach(function(child) {
                child.style.cssText = NUCLEAR_HIDE;
                if (child.parentNode) {
                  child.parentNode.removeChild(child);
                }
              });
            });
          } catch(e) {
            // Silently ignore errors
          }
        });
      }

      // Intercept element creation
      var _origCreate = document.createElement.bind(document);
      document.createElement = function(tag) {
        var el = _origCreate(tag);
        if (tag && tag.toLowerCase() === 'a') {
          var _origSetAttr = el.setAttribute.bind(el);
          el.setAttribute = function(name, value) {
            _origSetAttr(name, value);
            if ((name === 'id' && String(value).includes('emergent')) ||
                (name === 'href' && String(value).includes('emergent')) ||
                (name === 'class' && String(value).includes('emergent'))) {
              el.style.cssText = NUCLEAR_HIDE;
              // Prevent click events
              el.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                return false;
              }, true);
              // Remove immediately
              setTimeout(function() {
                if (el.parentNode) el.parentNode.removeChild(el);
              }, 0);
            }
          };
        }
        return el;
      };

      // MutationObserver with aggressive removal
      var mo = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length) {
            obliterateBadge();
          }
        });
      });

      // Initialize
      function init() {
        obliterateBadge();
        
        if (document.documentElement) {
          mo.observe(document.documentElement, { 
            childList: true, 
            subtree: true,
            attributes: true,
            attributeFilter: ['id', 'class', 'href']
          });
        }
      }

      // Run immediately
      obliterateBadge();
      
      // Run on DOMContentLoaded
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Run on load
      window.addEventListener('load', function() {
        obliterateBadge();
        // Ultra-aggressive intervals
        [100, 200, 300, 500, 800, 1000, 1500, 2000, 3000, 5000, 8000].forEach(function(delay) {
          setTimeout(obliterateBadge, delay);
        });
      });

      // Continuous monitoring (aggressive for first 10 seconds)
      var counter = 0;
      var aggressiveInterval = setInterval(function() {
        obliterateBadge();
        counter++;
        if (counter > 100) { // After 10 seconds (100ms × 100)
          clearInterval(aggressiveInterval);
          // Then check every 2 seconds indefinitely
          setInterval(obliterateBadge, 2000);
        }
      }, 100);

      // Intercept all click events on emergent elements
      document.addEventListener('click', function(e) {
        var target = e.target;
        var href = target.getAttribute && target.getAttribute('href');
        var id = target.getAttribute && target.getAttribute('id');
        var className = target.getAttribute && target.getAttribute('class');
        
        if ((href && href.includes('emergent')) ||
            (id && id.includes('emergent')) ||
            (className && className.includes('emergent'))) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          obliterateBadge();
          return false;
        }
      }, true);

    })();
    </script>
